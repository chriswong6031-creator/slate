<style>
/* Slate — base: tokens, layout, topbar, canvas, boards */

:root {
  --bg: #F5F6F8;
  --dot: #D8DCE3;
  --ink: #1B2230;
  --ink-2: #5C6470;
  --ink-3: #9AA1AC;
  --surface: #FFFFFF;
  --tray: rgba(255, 255, 255, 0.62);
  --line: rgba(27, 34, 48, 0.09);
  --line-strong: rgba(27, 34, 48, 0.16);
  --accent: #3A5BF0;
  --accent-ink: #FFFFFF;
  --accent-soft: rgba(58, 91, 240, 0.09);
  --danger: #D14D4D;
  --hover: rgba(27, 34, 48, 0.05);
  --shadow-card: 0 1px 2px rgba(27, 34, 48, 0.07), 0 1px 1px rgba(27, 34, 48, 0.04);
  --shadow-card-hover: 0 3px 10px -2px rgba(27, 34, 48, 0.13), 0 1px 2px rgba(27, 34, 48, 0.06);
  --shadow-board: 0 12px 32px -16px rgba(27, 34, 48, 0.22), 0 2px 8px -2px rgba(27, 34, 48, 0.07);
  --shadow-pop: 0 16px 48px -12px rgba(27, 34, 48, 0.28), 0 3px 10px -2px rgba(27, 34, 48, 0.1);
  --toast-bg: #23293A;
  --toast-ink: #F2F4F8;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Inter", "Helvetica Neue", sans-serif;
  --mono: ui-monospace, "SF Mono", "Menlo", "Cascadia Mono", monospace;
}
[data-theme="dark"] {
  --bg: #0F1216;
  --dot: #262C35;
  --ink: #E7EAF0;
  --ink-2: #9AA3B0;
  --ink-3: #636C79;
  --surface: #1B212A;
  --tray: rgba(22, 26, 33, 0.62);
  --line: rgba(255, 255, 255, 0.08);
  --line-strong: rgba(255, 255, 255, 0.16);
  --accent: #6D87FF;
  --accent-ink: #0F1216;
  --accent-soft: rgba(109, 135, 255, 0.13);
  --danger: #E36868;
  --hover: rgba(255, 255, 255, 0.06);
  --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.28), 0 1px 1px rgba(0, 0, 0, 0.18);
  --shadow-card-hover: 0 4px 12px -2px rgba(0, 0, 0, 0.45), 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-board: 0 14px 36px -16px rgba(0, 0, 0, 0.6), 0 2px 8px -2px rgba(0, 0, 0, 0.35);
  --shadow-pop: 0 16px 48px -12px rgba(0, 0, 0, 0.65), 0 3px 10px -2px rgba(0, 0, 0, 0.4);
  --toast-bg: #E7EAF0;
  --toast-ink: #1B2230;
}

/* card tints: --t-bar (edge), --t-bg (card wash), --t-text (chip ink) */
.tint-c1 { --t-bar: #E05D77; --t-bg: #FCF0F2; --t-text: #AD3B55; }
.tint-c2 { --t-bar: #E5764C; --t-bg: #FCF2ED; --t-text: #B14E28; }
.tint-c3 { --t-bar: #DFA43F; --t-bg: #FBF5E8; --t-text: #8F6A1E; }
.tint-c4 { --t-bar: #6FA85E; --t-bg: #F1F7EE; --t-text: #497C3A; }
.tint-c5 { --t-bar: #41A69F; --t-bg: #ECF6F5; --t-text: #2A7B75; }
.tint-c6 { --t-bar: #4C8FDE; --t-bg: #EEF5FC; --t-text: #2F6BB2; }
.tint-c7 { --t-bar: #7B6DE9; --t-bg: #F3F1FD; --t-text: #5A4BC5; }
.tint-c8 { --t-bar: #B562B0; --t-bg: #F9F0F9; --t-text: #8E4589; }
[data-theme="dark"] .tint-c1 { --t-bg: rgba(224, 93, 119, 0.15); --t-text: #F095A8; }
[data-theme="dark"] .tint-c2 { --t-bg: rgba(229, 118, 76, 0.15); --t-text: #F0A183; }
[data-theme="dark"] .tint-c3 { --t-bg: rgba(223, 164, 63, 0.14); --t-text: #E9C079; }
[data-theme="dark"] .tint-c4 { --t-bg: rgba(111, 168, 94, 0.15); --t-text: #A4CE96; }
[data-theme="dark"] .tint-c5 { --t-bg: rgba(65, 166, 159, 0.15); --t-text: #8BD0CB; }
[data-theme="dark"] .tint-c6 { --t-bg: rgba(76, 143, 222, 0.15); --t-text: #97BFEE; }
[data-theme="dark"] .tint-c7 { --t-bg: rgba(123, 109, 233, 0.16); --t-text: #B1A7F2; }
[data-theme="dark"] .tint-c8 { --t-bg: rgba(181, 98, 176, 0.16); --t-text: #D9A0D6; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--ink);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
body.dragging-any, body.dragging-any * { cursor: grabbing !important; user-select: none; }

/* ---------- topbar ---------- */
#topbar {
  height: 52px;
  flex: 0 0 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px 0 16px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  z-index: 50;
}
.tb-left, .tb-right { display: flex; align-items: center; gap: 6px; }
.logo { display: flex; align-items: center; margin-right: 4px; }
.ws-switcher {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 9px;
  font-size: 15px;
  font-weight: 650;
  letter-spacing: -0.015em;
}
.ws-switcher:hover { background: var(--hover); }
.ws-switcher .chev { color: var(--ink-3); margin-top: 1px; flex-shrink: 0; }
.ws-name {
  display: block;
  max-width: 32vw;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tb-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
}
.tb-btn:hover { background: var(--hover); color: var(--ink); }
.tb-btn.icon-only { padding: 7px; }

/* segmented control (view switcher, brain tabs) */
.seg {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--hover);
  border-radius: 9px;
  padding: 2.5px;
}
.seg-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4.5px 11px;
  border-radius: 7px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-2);
  transition: color 120ms ease, background 120ms ease;
}
.seg-btn svg { opacity: 0.75; }
.seg-btn:hover { color: var(--ink); }
.seg-btn.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-card);
}
.seg-btn.active svg { opacity: 1; color: var(--accent); }

/* ---------- canvas ---------- */
#viewport {
  flex: 1;
  overflow: auto;
  position: relative;
}
#viewport.panning { cursor: grabbing; }
#canvas {
  position: relative;
  background-image: radial-gradient(var(--dot) 1.1px, transparent 1.1px);
  background-size: 22px 22px;
  cursor: default;
}
.canvas-hint {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  color: var(--ink-3);
  font-size: 13.5px;
  letter-spacing: 0.01em;
  pointer-events: none;
  z-index: 5;
}

/* ---------- board ---------- */
.board {
  position: absolute;
  width: 300px;
  display: flex;
  flex-direction: column;
  max-height: min(72vh, 640px);
  background: var(--tray);
  -webkit-backdrop-filter: blur(12px) saturate(1.15);
  backdrop-filter: blur(12px) saturate(1.15);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow-board);
}
.board-enter { animation: board-in 240ms cubic-bezier(0.2, 0.8, 0.3, 1); }
@keyframes board-in {
  from { opacity: 0; transform: scale(0.95) translateY(4px); }
  to { opacity: 1; transform: none; }
}
.board.tidying { transition: left 400ms cubic-bezier(0.25, 0.8, 0.3, 1), top 400ms cubic-bezier(0.25, 0.8, 0.3, 1); }
.board.board-dragging {
  box-shadow: 0 24px 56px -20px rgba(27, 34, 48, 0.38), 0 4px 14px -4px rgba(27, 34, 48, 0.14);
  transform: scale(1.012);
}
[data-theme="dark"] .board.board-dragging {
  box-shadow: 0 24px 56px -18px rgba(0, 0, 0, 0.75), 0 4px 14px -4px rgba(0, 0, 0, 0.4);
}

.board-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 10px 7px 14px;
  cursor: grab;
  user-select: none;
}
.board-title {
  font-size: 14px;
  font-weight: 650;
  letter-spacing: -0.012em;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.board-title-input {
  flex: 1;
  min-width: 0;
  font-size: 14px;
  font-weight: 650;
  letter-spacing: -0.012em;
  border: none;
  background: var(--surface);
  border-radius: 6px;
  padding: 2px 6px;
  margin-left: -6px;
  box-shadow: 0 0 0 2px var(--accent);
}
.board-title-input:focus { outline: none; }
.board-count {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  background: var(--hover);
  padding: 2px 7px;
  border-radius: 99px;
}
.board-menu-btn { color: var(--ink-3); border-radius: 6px; padding: 4px; }
.board-menu-btn:hover { background: var(--hover); color: var(--ink); }

.cards {
  flex: 1 1 auto;
  min-height: 4px;
  overflow-y: auto;
  padding: 2px 10px 2px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--line-strong) transparent;
}
.cards::-webkit-scrollbar { width: 8px; }
.cards::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }

.board-foot { padding: 6px 10px 10px; }
.add-card-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 8px;
  border-radius: 9px;
  color: var(--ink-3);
  font-size: 13px;
  font-weight: 500;
}
.add-card-btn:hover { background: var(--hover); color: var(--ink-2); }

/* viewport scrollbars */
#viewport::-webkit-scrollbar { width: 11px; height: 11px; }
#viewport::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 3px solid var(--bg); }
#viewport::-webkit-scrollbar-corner { background: transparent; }

/* ---------- touch ---------- */
/* manipulation: native pan + pinch stay, double-tap zoom goes (so dblclick works on touch) */
#viewport, #canvas { touch-action: manipulation; }
.board-head { touch-action: none; }   /* board drag wins immediately */
.card { touch-action: pan-y; }        /* lists scroll naturally; long-press lifts a card */

/* ---------- small screens ---------- */
@media (max-width: 700px) {
  #topbar { padding: 0 8px; }
  .tb-left, .tb-right { gap: 3px; }
  .logo { display: none; }
  #tidyBtn span { display: none; }
  .ws-switcher { font-size: 14px; padding: 6px 7px; }
  .ws-name { max-width: 26vw; }
  .seg-btn { padding: 4.5px 8px; font-size: 12px; }
  .canvas-hint { font-size: 12.5px; padding: 0 24px; text-align: center; width: 100%; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}

</style>
<style>
/* Slate — components: cards, chips, composer, modal, popover, toast, lightbox, done ledger */

/* ---------- card ---------- */
.card {
  position: relative;
  background: var(--surface);
  border-radius: 10px;
  padding: 9px 11px 9px 12px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--line);
  cursor: pointer;
  user-select: none;
  overflow: hidden;
  flex-shrink: 0;
  transition: box-shadow 140ms ease, transform 140ms ease;
}
.card:hover { box-shadow: var(--shadow-card-hover); }
.card[class*="tint-"] { background: var(--t-bg); }
.card[class*="tint-"]::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--t-bar);
}
.card.drop-target {
  box-shadow: 0 0 0 2px var(--accent), var(--shadow-card-hover);
}
.card-row { display: flex; align-items: flex-start; gap: 9px; }
.card-title {
  font-size: 13.5px;
  line-height: 1.42;
  font-weight: 500;
  letter-spacing: -0.006em;
  min-width: 0;
  overflow-wrap: break-word;
  width: 100%;
  padding-top: 0.5px;
}
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 7px 0 1px 27px;
}
.card-atts {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 8px 0 1px 27px;
}

/* complete circle */
.complete-circle {
  flex: 0 0 18px;
  width: 18px;
  height: 18px;
  margin-top: 1.5px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
}
.circle-svg { width: 18px; height: 18px; display: block; }
.circle-svg .ring {
  fill: transparent;
  stroke: currentColor;
  stroke-width: 1.5;
  transition: stroke 120ms ease, fill 160ms ease;
}
.circle-svg .tick {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.9;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 12;
  stroke-dashoffset: 12;
  opacity: 0;
  transition: opacity 100ms ease;
}
.complete-circle:hover { color: var(--accent); }
.complete-circle:hover .tick { opacity: 0.45; stroke-dashoffset: 0; transition: stroke-dashoffset 180ms ease, opacity 100ms ease; }
.card.completing .circle-svg .ring { fill: var(--accent); stroke: var(--accent); }
.card.completing .circle-svg .tick {
  stroke: var(--accent-ink);
  opacity: 1;
  animation: tick-draw 260ms 60ms cubic-bezier(0.3, 0.7, 0.4, 1) forwards;
}
@keyframes tick-draw { from { stroke-dashoffset: 12; } to { stroke-dashoffset: 0; } }
.card.completing .card-title { color: var(--ink-3); }
.card.collapsing {
  transition: height 220ms cubic-bezier(0.4, 0, 0.6, 1), opacity 180ms ease, padding 220ms ease, margin 220ms ease, border-width 220ms ease;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  margin-top: -8px;
  border-width: 0;
}

/* filled circle (done list) */
.complete-circle.filled {
  background: var(--accent);
  color: var(--accent-ink);
}
.complete-circle.filled:hover { background: var(--ink-3); }

/* ---------- chips ---------- */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  padding: 2.5px 7px;
  border-radius: 99px;
  background: var(--hover);
  color: var(--ink-2);
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tag-chip[class*="tint-"] { background: var(--t-bg); color: var(--t-text); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--t-bar) 28%, transparent); }
.card[class*="tint-"] .tag-chip[class*="tint-"] { background: color-mix(in srgb, var(--surface) 55%, var(--t-bg)); }
.due-chip { font-family: var(--mono); font-weight: 500; font-size: 10px; }
.due-chip.due-overdue { background: rgba(209, 77, 77, 0.12); color: var(--danger); }
.due-chip.due-today { background: rgba(223, 164, 63, 0.16); color: #96650E; }
[data-theme="dark"] .due-chip.due-today { color: #E9C079; }
.desc-chip { padding: 2.5px 5px; }

/* attachments on card */
.att { border-radius: 7px; display: inline-flex; align-items: center; }
.att-img img {
  width: 34px;
  height: 34px;
  border-radius: 7px;
  object-fit: cover;
  display: block;
  border: 1px solid var(--line);
}
.att-img:hover img { box-shadow: 0 0 0 2px var(--accent); }
.att-file {
  gap: 4px;
  padding: 4px 8px;
  background: var(--hover);
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.att-file:hover { color: var(--ink); border-color: var(--line-strong); }
.att-ext { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.04em; }

/* ---------- ghost & placeholder (card drag) ---------- */
.card-ghost {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  box-shadow: 0 20px 44px -12px rgba(27, 34, 48, 0.4), 0 4px 12px -2px rgba(27, 34, 48, 0.16);
  opacity: 0.98;
}
[data-theme="dark"] .card-ghost { box-shadow: 0 20px 44px -10px rgba(0, 0, 0, 0.75); }
.card-placeholder {
  border-radius: 10px;
  border: 1.5px dashed var(--line-strong);
  background: var(--hover);
  flex-shrink: 0;
}

/* ---------- done ledger ---------- */
.done-bar {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 0 10px 10px;
  padding: 6px 8px;
  border-radius: 8px;
  border-top: 1px solid var(--line);
  border-radius: 0;
  color: var(--ink-3);
  font-size: 12px;
  font-weight: 500;
}
.done-bar:hover { color: var(--ink-2); }
.done-bar-check {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
}
.done-bar-label { flex: 1; text-align: left; font-family: var(--mono); font-size: 11px; }
.done-bar-chev { display: flex; color: var(--ink-3); transition: transform 160ms ease; }
.done-bar-chev.open { transform: rotate(180deg); }
.done-bar-chev svg { display: block; }
.done-list {
  padding: 0 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  max-height: 220px;
}
.done-card {
  opacity: 0.62;
  box-shadow: none;
  background: transparent;
  border-color: transparent;
}
.done-card:hover { opacity: 0.9; background: var(--hover); box-shadow: none; }
.done-card .card-title { color: var(--ink-2); text-decoration: line-through; text-decoration-color: var(--line-strong); }
.done-clear {
  align-self: flex-start;
  margin: 2px 0 0 27px;
  font-size: 11.5px;
  color: var(--ink-3);
  border-radius: 6px;
  padding: 3px 6px;
}
.done-clear:hover { color: var(--danger); background: rgba(209, 77, 77, 0.08); }

/* ---------- composer ---------- */
.composer { display: flex; flex-direction: column; gap: 6px; }
.composer-title, .composer-desc {
  width: 100%;
  resize: none;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: var(--surface);
  padding: 8px 11px;
  font-size: 13.5px;
  line-height: 1.4;
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.composer-title:focus, .composer-desc:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.composer-desc { font-size: 12.5px; color: var(--ink-2); }
.composer-row { display: flex; align-items: center; gap: 4px; }
.composer-row .primary-btn { margin-right: 4px; }

/* ---------- shared buttons ---------- */
.primary-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--accent);
  color: var(--accent-ink);
  font-size: 13px;
  font-weight: 600;
  padding: 7px 13px;
  border-radius: 9px;
  transition: filter 120ms ease, transform 120ms ease;
}
.primary-btn:hover { filter: brightness(1.07); }
.primary-btn:active { transform: scale(0.98); }
.ghost-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border-radius: 8px;
  color: var(--ink-3);
  font-size: 12.5px;
  font-weight: 500;
}
.ghost-btn:hover { background: var(--hover); color: var(--ink-2); }
.ghost-btn.danger:hover { color: var(--danger); background: rgba(209, 77, 77, 0.08); }

/* ---------- modal ---------- */
.modal-backdrop {
  position: fixed;
  inset: 0;

  const vp = $('#viewport');

  vp.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;

    vp.classList.remove('panning');

    if (state.view === 'brain') { // brain scroll is session-only, and never clobbers workspace scroll

    const h = node ? node.offsetHeight : 200;

    for (let i = 1; i < cols; i++) if (heights[i] < heights[col]) col = i;

    };
    ghost.addEventListener('transitionend', finish, { once: true });
    setTimeout(finish, 220); // safety net
    document.body.classList.remove('dragging-any');
    unlockTouchScroll();
    stopAutoscroll();
    drag = null;
  }

  function cancelCardDrag() {
    drag.ghost.remove();
    rerenderBoard(drag.fromBoard.id);
    document.body.classList.remove('dragging-any');
    unlockTouchScroll();
    stopAutoscroll();
    drag = null;
  }
})();

<script>
/* Slate — UI components: toasts, undo, popovers, lightbox, composer, complete ritual, board menu, file drops */
'use strict';

/* ---------- toasts + single-slot undo ---------- */
let toastTimer = null;
function toast(msg, opts) {
  opts = opts || {};
  const root = $('#toastRoot');
  root.textContent = '';
  const t = el('div', 'toast' + (opts.tone ? ' toast-' + opts.tone : ''));
  t.appendChild(el('span', 'toast-msg', msg));
  if (opts.action) {
    const btn = el('button', 'toast-action', opts.action.label);
    btn.addEventListener('click', () => { opts.action.fn(); dismissToast(); });
    t.appendChild(btn);
  }
  root.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(dismissToast, opts.ms || (opts.action ? 6000 : 3200));
}
function dismissToast() {
  const t = $('#toastRoot .toast');
  if (!t) return;
  t.classList.remove('show');
  setTimeout(() => t.remove(), 220);
}
function undoableToast(msg, revert) {
  toast(msg, { action: { label: 'Undo', fn: () => { revert(); save(); renderAll(); } } });
}

/* ---------- popover ---------- */
let activePopoverClose = null;
function openPopover(anchor, build, opts) {
  closePopover();
  const root = $('#popoverRoot');
  const pop = el('div', 'popover' + ((opts && opts.cls) ? ' ' + opts.cls : ''));
  root.appendChild(pop);
  const close = () => {
    pop.remove();
    window.removeEventListener('mousedown', onOutside, true);
    window.removeEventListener('keydown', onKey, true);
    activePopoverClose = null;
  };
  build(pop, close);
  const r = anchor.getBoundingClientRect();
  pop.style.top = Math.min(r.bottom + 6, window.innerHeight - pop.offsetHeight - 12) + 'px';
  pop.style.left = clamp(r.left, 8, window.innerWidth - pop.offsetWidth - 8) + 'px';
  requestAnimationFrame(() => pop.classList.add('show'));
  function onOutside(e) { if (!pop.contains(e.target) && e.target !== anchor && !anchor.contains(e.target)) close(); }
  function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); close(); } }
  window.addEventListener('mousedown', onOutside, true);
  window.addEventListener('keydown', onKey, true);
  activePopoverClose = close;
  return close;
}
function closePopover() { if (activePopoverClose) activePopoverClose(); }
function popItem(label, icon, fn, cls) {
  const b = el('button', 'pop-item' + (cls ? ' ' + cls : ''));
  if (icon) b.appendChild(svgIcon(icon, 14, 1.5));
  b.appendChild(el('span', null, label));
  b.addEventListener('click', fn);
  return b;
}

/* ---------- lightbox ---------- */
function openLightbox(att, dataUrl) {
  const root = $('#lightboxRoot');
  root.textContent = '';
  const bg = el('div', 'lightbox');
  const fig = el('figure', 'lightbox-fig');
  const img = el('img');
  img.src = dataUrl;
  img.alt = att.name;
  const cap = el('figcaption', 'lightbox-cap');
  cap.appendChild(el('span', 'lightbox-name', att.name));
  const dl = el('button', 'lightbox-dl');
  dl.appendChild(svgIcon(ICONS.download, 14, 1.6));
  dl.appendChild(el('span', null, 'Download'));
  dl.addEventListener('click', (e) => {
    e.stopPropagation();
    const a = document.createElement('a');
    a.href = dataUrl; a.download = att.name;
    document.body.appendChild(a); a.click(); a.remove();
  });
  cap.appendChild(dl);
  fig.append(img, cap);
  bg.appendChild(fig);
  root.appendChild(bg);
  requestAnimationFrame(() => bg.classList.add('show'));
  const close = () => { bg.classList.remove('show'); setTimeout(() => bg.remove(), 200); window.removeEventListener('keydown', onKey); };
  bg.addEventListener('mousedown', (e) => { if (e.target === bg) close(); });
  function onKey(e) { if (e.key === 'Escape') close(); }
  window.addEventListener('keydown', onKey);
}

/* ---------- complete / restore ritual ---------- */
function completeCard(cardId) {
  const found = findCard(cardId);
  if (!found || found.done) return;
  // state-level re-entry guard: a mid-ritual re-render swaps the DOM node, so a class check is not enough
  if (found.card._completing) return;
  found.card._completing = true;
  const node = $('.card[data-id="' + cardId + '"]');
  const doMove = () => {
    delete found.card._completing;
    const idx = found.board.cards.indexOf(found.card);
    if (idx >= 0) found.board.cards.splice(idx, 1);
    found.card.completed = Date.now();
    if (!found.board.done.includes(found.card)) found.board.done.unshift(found.card);
    save();
    rerenderBoard(found.board.id);
  };
  if (!node) { doMove(); return; }
  node.classList.add('completing');
  setTimeout(() => {
    node.style.height = node.offsetHeight + 'px';
    node.getBoundingClientRect();
    node.classList.add('collapsing');
    node.style.height = '0px';
    setTimeout(doMove, 240);
  }, 420);
}
function restoreCard(cardId) {
  for (const b of activeWs().boards) {
    const i = b.done.findIndex(c => c.id === cardId);
    if (i >= 0) {
      const card = b.done.splice(i, 1)[0];
      card.completed = null;
      b.cards.push(card);
      save();
      rerenderBoard(b.id);
      return;
    }
  }
}

/* ---------- card composer ---------- */
function openComposer(boardNode, board, draft) {
  const foot = $('.board-foot', boardNode);
  if ($('.composer', boardNode)) { $('.composer textarea', boardNode).focus(); return; }
  foot.textContent = '';
  const comp = el('div', 'composer');
  const title = el('textarea', 'composer-title');
  title.rows = 1;
  title.placeholder = 'Card title';
  const desc = el('textarea', 'composer-desc');
  desc.rows = 2;
  desc.placeholder = 'Description';
  desc.hidden = true;
  const row = el('div', 'composer-row');
  const addBtn = el('button', 'primary-btn', 'Add card');
  const descBtn = el('button', 'ghost-btn composer-desc-btn');
  descBtn.title = 'Add a description';
  descBtn.appendChild(svgIcon(ICONS.text, 14, 1.6));
  const closeBtn = el('button', 'ghost-btn');
  closeBtn.title = 'Close';
  closeBtn.appendChild(svgIcon(ICONS.x, 13, 1.7));
  row.append(addBtn, descBtn, closeBtn);
  comp.append(title, desc, row);
  foot.appendChild(comp);
  autoGrow(title); autoGrow(desc);
  if (draft) {
    title.value = draft.t;
    desc.value = draft.d;
    desc.hidden = draft.dHidden;
    if (draft.focused) title.focus();
  } else {
    title.focus();
  }

  const closeComposer = () => { comp.remove(); rerenderBoard(board.id); };
  const submit = () => {
    const t = title.value.trim();
    if (!t) { title.focus(); return; }
    const card = newCard(t);
    if (!desc.hidden && desc.value.trim()) card.d = desc.value.trim();
    title.value = ''; desc.value = ''; // clear before rerender so the draft-preserve path reopens empty
    board.cards.push(card);
    save();
    rerenderBoard(board.id);
    const bn = $('.board[data-id="' + board.id + '"]');
    const list = $('.cards', bn);
    list.scrollTop = list.scrollHeight;
    openComposer(bn, board); // stay open for rapid entry
  };
  addBtn.addEventListener('click', submit);
  descBtn.addEventListener('click', () => { desc.hidden = false; desc.focus(); });
  closeBtn.addEventListener('click', closeComposer);
  title.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    if (e.key === 'Escape') closeComposer();
  });
  desc.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeComposer(); });
}
function autoGrow(ta) {
  const fit = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
  ta.addEventListener('input', fit);
  requestAnimationFrame(fit);
}

/* ---------- board rename ---------- */
function startBoardRename(boardNode, board, isNew) {
  const titleEl = $('.board-title', boardNode);
  const input = el('input', 'board-title-input');
  input.value = board.name;
  input.placeholder = 'Name this board';
  input.maxLength = 80;
  titleEl.replaceWith(input);
  input.focus();
  input.select();
  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    const v = input.value.trim();
    if (v) board.name = v;
    else if (isNew) board.name = 'Untitled';
    save();
    rerenderBoard(board.id);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = board.name || (isNew ? 'Untitled' : ''); input.blur(); }
  });
}

/* ---------- board menu ---------- */
function openBoardMenu(anchor, board) {
  openPopover(anchor, (pop, close) => {
    pop.appendChild(popItem('Rename board', ICONS.pencil, () => {
      close();
      const node = $('.board[data-id="' + board.id + '"]');
      startBoardRename(node, board, false);
    }));
    if (board.done.length) {
      pop.appendChild(popItem(board.showDone ? 'Hide completed' : 'Show completed (' + board.done.length + ')', ICONS.check, () => {
        close();
        board.showDone = !board.showDone;
        save();
        rerenderBoard(board.id);
      }));
    }
    pop.appendChild(popItem('Delete board', ICONS.trash, () => {
      close();
      const ws = activeWs();
      const idx = ws.boards.indexOf(board);
      ws.boards.splice(idx, 1);
      save();
      rerenderBoard(board.id);
      $('#hint').hidden = ws.boards.length > 0;
      undoableToast('Board deleted', () => ws.boards.splice(clamp(idx, 0, ws.boards.length), 0, board));
    }, 'danger'));
  });
}

/* ---------- file drag-in (attachments) ---------- */
(function fileDrops() {
  let dropCard = null;
  window.addEventListener('dragover', (e) => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
    e.preventDefault();
    const over = document.elementFromPoint(e.clientX, e.clientY);
    const cardNode = over && over.closest('.card:not(.done-card)');
    if (dropCard && dropCard !== cardNode) dropCard.classList.remove('drop-target');
    dropCard = cardNode || null;
    if (dropCard) {
      dropCard.classList.add('drop-target');
      e.dataTransfer.dropEffect = 'copy';
    } else {
      e.dataTransfer.dropEffect = 'none';
    }
  });
  window.addEventListener('dragleave', (e) => {
    if (e.relatedTarget === null && dropCard) { dropCard.classList.remove('drop-target'); dropCard = null; }
  });
  window.addEventListener('drop', async (e) => {
    e.preventDefault();
    const node = dropCard;
    if (dropCard) { dropCard.classList.remove('drop-target'); dropCard = null; }
    if (!node || !e.dataTransfer.files.length) return;
    const found = findCard(node.dataset.id);
    if (!found) return;
    const n = await addAttachmentsToCard(found.card, e.dataTransfer.files);
    if (n) {
      rerenderBoard(found.board.id);
      const openModal = $('.modal[data-card-id="' + found.card.id + '"]');
      if (openModal && typeof refreshModalAttachments === 'function') refreshModalAttachments(found.card);
      toast(n === 1 ? 'File attached' : n + ' files attached');
    }
  });
})();

/* ---------- canvas click delegation ---------- */
(function canvasClicks() {
  $('#canvas').addEventListener('click', (e) => {
    const boardNode = e.target.closest('.board');
    if (!boardNode) return;
    const board = findBoard(boardNode.dataset.id);
    if (!board) return;

    const circle = e.target.closest('.complete-circle');
    if (circle) {
      const cardNode = circle.closest('.card');
      if (circle.classList.contains('filled')) restoreCard(cardNode.dataset.id);
      else completeCard(cardNode.dataset.id);
      return;
    }
    const attBtn = e.target.closest('.att');
    if (attBtn) {
      const found = findCard(attBtn.closest('.card').dataset.id);
      const att = found && found.card.at.find(a => a.id === attBtn.dataset.attId);
      if (att) openAttachment(att);
      return;
    }
    if (e.target.closest('.add-card-btn')) { openComposer(boardNode, board); return; }
    if (e.target.closest('.board-menu-btn')) { openBoardMenu(e.target.closest('.board-menu-btn'), board); return; }
    const doneBar = e.target.closest('.done-bar');
    if (doneBar) {
      board.showDone = !board.showDone;
      save();
      rerenderBoard(board.id);
      return;
    }
    if (e.target.closest('.done-clear')) {
      const cleared = board.done.slice();
      board.done = [];
      board.showDone = false;
      save();
      rerenderBoard(board.id);
      undoableToast(cleared.length + ' completed cards cleared', () => { board.done = cleared.concat(board.done); });
      return;
    }
    const cardNode = e.target.closest('.card');
    if (cardNode && !cardNode.classList.contains('done-card') && !e.target.closest('button')) {
      openCardModal(cardNode.dataset.id);
      return;
    }
    if (cardNode && cardNode.classList.contains('done-card') && !e.target.closest('button')) {
      openCardModal(cardNode.dataset.id);
    }
  });

  $('#canvas').addEventListener('dblclick', (e) => {
    const titleEl = e.target.closest('.board-title');
    if (titleEl) {
      const boardNode = titleEl.closest('.board');
      startBoardRename(boardNode, findBoard(boardNode.dataset.id), false);
    }
  });
})();

<script>
/* Slate — Brain: ephemeral capture board + permanent topic library.
   Notes are saved into their topic the moment they're filed ("shadow push");
   the capture board itself is session-only and wipes on refresh/close. */
'use strict';

let brainTab = 'board';                 // 'board' | 'library' (session only)
let captureNotes = [];                  // [{id, x, y}] — refs to saved notes, session only
let brainScroll = { x: 0, y: 0 };       // capture-board scroll, session only
let activeBnoteComposer = null;         // open composer element (survives re-renders)
const BNOTE_W = 340;

/* ---------- lookups ---------- */
function findNote(noteId) {
  for (const cat of state.brain.categories) {
    const i = cat.notes.findIndex(n => n.id === noteId);
    if (i >= 0) return { cat, note: cat.notes[i], index: i };
  }
  return null;
}
function findCat(catId) { return state.brain.categories.find(c => c.id === catId); }
function catColor(cat) { return tagColor(cat.name); }

/* ---------- rendering ---------- */
let lastBrainTabRendered = null; // scroll resets only when a tab is ENTERED, not on in-place re-renders
function renderBrain() {
  const entering = lastBrainTabRendered !== brainTab;
  lastBrainTabRendered = brainTab;
  if (brainTab === 'library') renderLibrary(entering);
  else renderCaptureBoard();
  if (entering) fadeIn($('#viewport'));
}

function renderCaptureBoard() {
  const canvas = $('#canvas');
  canvas.style.width = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';
  canvas.textContent = '';
  captureNotes = captureNotes.filter(ref => findNote(ref.id)); // drop refs to deleted notes
  for (const ref of captureNotes) {
    const f = findNote(ref.id);
    const node = bnoteEl(f.note);
    node.style.left = ref.x + 'px';
    node.style.top = ref.y + 'px';
    canvas.appendChild(node);
  }
  if (activeBnoteComposer) canvas.appendChild(activeBnoteComposer);
  const hint = $('#hint');
  hint.textContent = 'Double-click anywhere to write down something you’ve learned';
  hint.hidden = captureNotes.length > 0 || !!activeBnoteComposer;
  const vp = $('#viewport');
  vp.scrollLeft = brainScroll.x;
  vp.scrollTop = brainScroll.y;
}

function renderLibrary(resetScroll) {
  const lib = $('#library');
  lib.textContent = '';
  $('#hint').hidden = true;
  const cats = state.brain.categories;
  const total = cats.reduce((n, c) => n + c.notes.length, 0);
  const head = el('div', 'library-head');
  head.appendChild(el('h1', 'library-title', 'Library'));
  head.appendChild(el('span', 'library-count', total + (total === 1 ? ' note' : ' notes') + ' · ' + cats.length + (cats.length === 1 ? ' topic' : ' topics')));
  lib.appendChild(head);
  if (!cats.length) {
    const empty = el('div', 'library-empty');
    empty.appendChild(el('div', 'library-empty-title', 'Nothing saved yet'));
    empty.appendChild(el('div', 'library-empty-sub', 'Write your first note on the Board — it lands here, filed under its topic.'));
    lib.appendChild(empty);
  } else {
    const grid = el('div', 'library-grid');
    for (const cat of cats) grid.appendChild(paneEl(cat));
    lib.appendChild(grid);
  }
  if (resetScroll) {
    $('#viewport').scrollTop = 0;
    $('#viewport').scrollLeft = 0;
  }
}

function bnoteEl(note) {
  const f = findNote(note.id);
  const color = f ? catColor(f.cat) : null;
  const root = el('article', 'bnote' + (color ? ' tint-' + color : ''));
  root.dataset.id = note.id;
  root.appendChild(el('div', 'bnote-text', note.text));
  const foot = el('div', 'bnote-foot');
  if (f) foot.appendChild(el('span', 'chip tag-chip tint-' + color, f.cat.name));
  const saved = el('span', 'bnote-saved');
  saved.appendChild(svgIcon(ICONS.check, 10, 2.2));
  saved.appendChild(el('span', null, 'Saved'));
  foot.appendChild(saved);
  root.appendChild(foot);
  return root;
}

function paneEl(cat) {
  const color = catColor(cat);
  const root = el('section', 'pane');
  root.dataset.id = cat.id;
  const head = el('header', 'pane-head');
  head.appendChild(el('span', 'pane-dot tint-' + color));
  const title = el('h2', 'pane-title', cat.name);
  title.title = 'Double-click to rename';
  const count = el('span', 'board-count', String(cat.notes.length));
  const menu = el('button', 'ghost-btn pane-menu-btn');
  menu.title = 'Topic actions';
  menu.appendChild(svgIcon(ICONS.dots, 15, 2.2));
  head.append(title, count, menu);
  root.appendChild(head);
  const list = el('div', 'pane-notes');
  if (!cat.notes.length) list.appendChild(el('div', 'pane-empty', 'Nothing filed here yet'));
  for (const n of cat.notes) {
    const p = el('article', 'pnote');
    p.dataset.id = n.id;
    p.appendChild(el('div', 'pnote-text', n.text));
    p.appendChild(el('div', 'pnote-date', new Date(n.created).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })));
    list.appendChild(p);
  }
  root.appendChild(list);
  return root;
}

/* ---------- the shadow push ---------- */
function flyToLibrary(fromEl) {
  const target = $('#brainTabs .seg-btn[data-tab="library"]');
  if (!target || !fromEl) return;
  const a = fromEl.getBoundingClientRect();
  const b = target.getBoundingClientRect();
  const g = el('div', 'fly-ghost');
  g.style.left = a.left + 'px';
  g.style.top = a.top + 'px';
  g.style.width = a.width + 'px';
  g.style.height = a.height + 'px';
  document.body.appendChild(g);
  g.getBoundingClientRect();
  const dx = (b.left + b.width / 2) - (a.left + a.width / 2);
  const dy = (b.top + b.height / 2) - (a.top + a.height / 2);
  g.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(0.05)';
  g.style.opacity = '0.2';
  setTimeout(() => {
    g.remove();
    target.classList.add('pulse');
    setTimeout(() => target.classList.remove('pulse'), 420);
  }, 560);
}

/* ---------- note composer (double-click / FAB) ---------- */
function openBnoteComposer(x, y) {
  if (activeBnoteComposer) { $('textarea', activeBnoteComposer).focus(); return; }
  const canvas = $('#canvas');
  const comp = el('article', 'bnote composing');
  comp.style.left = clamp(x, 8, CANVAS_W - BNOTE_W - 8) + 'px';
  comp.style.top = clamp(y, 8, CANVAS_H - 260) + 'px';

  const ta = el('textarea', 'bnote-input');
  ta.rows = 3;
  ta.placeholder = 'Write down what you’ve learned…';
  comp.appendChild(ta);

  comp.appendChild(el('div', 'bnote-label', 'File under'));
  const topics = el('div', 'bnote-topics');
  comp.appendChild(topics);
  const newTopic = el('input', 'bnote-newtopic');
  newTopic.placeholder = state.brain.categories.length ? 'New topic…' : 'Name a topic…';
  newTopic.maxLength = 40;
  comp.appendChild(newTopic);

  const actions = el('div', 'bnote-actions');
  const saveBtn = el('button', 'primary-btn', 'Save');
  const needMsg = el('span', 'bnote-need');
  const cancel = el('button', 'ghost-btn');
  cancel.title = 'Discard';
  cancel.appendChild(svgIcon(ICONS.x, 13, 1.7));
  actions.append(saveBtn, needMsg, cancel);
  comp.appendChild(actions);

  let selectedCatId = null;
  function renderTopics() {
    topics.textContent = '';
    const pending = newTopic.value.trim();
    for (const cat of state.brain.categories) {
      const chip = el('button', 'chip tag-chip topic-chip tint-' + catColor(cat) + (cat.id === selectedCatId && !pending ? ' active' : ''), cat.name);
      chip.addEventListener('click', () => {
        selectedCatId = cat.id;
        newTopic.value = '';
        renderTopics();
        refresh();
      });
      topics.appendChild(chip);
    }
    if (pending) {
      const chip = el('span', 'chip tag-chip topic-chip active tint-' + tagColor(pending), pending);
      topics.appendChild(chip);
    }
  }
  function refresh() {
    const hasText = !!ta.value.trim();
    const hasTopic = !!(newTopic.value.trim() || selectedCatId);
    saveBtn.disabled = !(hasText && hasTopic);
    needMsg.textContent = hasText && !hasTopic ? 'Pick a topic to save' : '';
  }
  ta.addEventListener('input', refresh);
  newTopic.addEventListener('input', () => { renderTopics(); refresh(); });
  newTopic.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); ta.focus(); }
    if (e.key === 'Escape') discard();
  });
  renderTopics();
  refresh();
  autoGrow(ta);

  function submit() {
    const text = ta.value.trim();
    const pending = newTopic.value.trim();
    if (!text || (!pending && !selectedCatId)) return;
    let cat;
    if (pending) {
      cat = state.brain.categories.find(c => c.name.toLowerCase() === pending.toLowerCase());
      if (!cat) { cat = newCategory(pending); state.brain.categories.push(cat); }
    } else {
      cat = findCat(selectedCatId);
      if (!cat) return;
    }
    const note = newNote(text);
    cat.notes.unshift(note);   // saved permanently, right now
    save();
    captureNotes.push({ id: note.id, x: parseInt(comp.style.left, 10), y: parseInt(comp.style.top, 10) });
    const savedNode = bnoteEl(note);
    savedNode.style.left = comp.style.left;
    savedNode.style.top = comp.style.top;
    savedNode.classList.add('bnote-enter');
    comp.replaceWith(savedNode);
    activeBnoteComposer = null;
    flyToLibrary(savedNode);
  }
  function discard() {
    comp.remove();
    activeBnoteComposer = null;
    $('#hint').hidden = captureNotes.length > 0;
  }
  saveBtn.addEventListener('click', submit);
  cancel.addEventListener('click', discard);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); submit(); }
    if (e.key === 'Escape') discard();
  });

  activeBnoteComposer = comp;
  canvas.appendChild(comp);
  $('#hint').hidden = true;
  ta.focus();
}

/* ---------- note modal (edit / re-file / delete) ---------- */
function openNoteModal(noteId) {
  const f = findNote(noteId);
  if (!f) return;
  const note = f.note;
  let cat = f.cat;
  const root = $('#modalRoot');
  root.textContent = '';

  const backdrop = el('div', 'modal-backdrop');
  const modal = el('div', 'modal tint-' + catColor(cat));
  modal.appendChild(el('div', 'modal-accent'));
  const body = el('div', 'modal-body');
  modal.appendChild(body);

  const ta = el('textarea', 'bnote-edit');
  ta.value = note.text;
  ta.placeholder = 'Your note';
  ta.addEventListener('input', () => { if (ta.value.trim()) note.text = ta.value.trim(); save(); });
  ta.addEventListener('blur', () => { if (!ta.value.trim()) ta.value = note.text; });
  body.appendChild(ta);
  autoGrow(ta);

  const topicSec = el('div', 'modal-section');
  topicSec.appendChild(el('div', 'modal-label', 'Topic'));
  const chips = el('div', 'bnote-topics');
  topicSec.appendChild(chips);
  const newTopic = el('input', 'bnote-newtopic');
  newTopic.placeholder = 'Move to a new topic…';
  newTopic.maxLength = 40;
  topicSec.appendChild(newTopic);
  body.appendChild(topicSec);

  function moveTo(target) {
    if (target === cat) return;
    const i = cat.notes.indexOf(note);
    if (i >= 0) cat.notes.splice(i, 1);
    target.notes.unshift(note);
    cat = target;
    save();
    modal.className = 'modal tint-' + catColor(cat);
    renderChips();
  }
  function renderChips() {
    chips.textContent = '';
    for (const c of state.brain.categories) {
      const chip = el('button', 'chip tag-chip topic-chip tint-' + catColor(c) + (c === cat ? ' active' : ''), c.name);
      chip.addEventListener('click', () => moveTo(c));
      chips.appendChild(chip);
    }
  }
  newTopic.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const name = newTopic.value.trim();
    if (!name) return;
    let target = state.brain.categories.find(c => c.name.toLowerCase() === name.toLowerCase());
    if (!target) { target = newCategory(name); state.brain.categories.push(target); }
    newTopic.value = '';
    moveTo(target);
  });
  renderChips();

  const foot = el('div', 'modal-foot');
  const stamp = el('span', 'modal-stamp', 'Saved ' + new Date(note.created).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }));
  const del = el('button', 'ghost-btn danger');
  del.appendChild(svgIcon(ICONS.trash, 13, 1.5));
  del.appendChild(el('span', null, 'Delete'));
  del.addEventListener('click', () => {
    closeModal();
    const holder = cat;
    const idx = holder.notes.indexOf(note);
    if (idx >= 0) holder.notes.splice(idx, 1);
    const capRef = captureNotes.find(r => r.id === note.id);
    captureNotes = captureNotes.filter(r => r.id !== note.id);
    save();
    renderAll();
    undoableToast('Note deleted', () => {
      holder.notes.splice(clamp(idx, 0, holder.notes.length), 0, note);
      if (capRef) captureNotes.push(capRef);
    });
  });
  foot.append(del, stamp);
  modal.appendChild(foot);

  backdrop.appendChild(modal);
  root.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add('show'));

  let closed = false;
  function closeModal() {
    if (closed) return;
    closed = true;
    backdrop.classList.remove('show');
    setTimeout(() => backdrop.remove(), 180);
    window.removeEventListener('keydown', onKey);
    save.flush();
    if (state.view === 'brain') renderAll();
  }
  backdrop.addEventListener('mousedown', (e) => { if (e.target === backdrop) closeModal(); });
  function onKey(e) { if (e.key === 'Escape' && !activePopoverClose) closeModal(); }
  window.addEventListener('keydown', onKey);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

/* ---------- pane menu (rename / delete topic) ---------- */
function startPaneRename(paneNode, cat) {
  const titleEl = $('.pane-title', paneNode);
  const input = el('input', 'board-title-input');
  input.value = cat.name;
  input.maxLength = 40;
  titleEl.replaceWith(input);
  input.focus();
  input.select();
  let done = false;
  const commit = () => {
    if (done) return;
    done = true;
    const v = input.value.trim();
    if (v && v !== cat.name) {
      const dup = state.brain.categories.find(c => c !== cat && c.name.toLowerCase() === v.toLowerCase());
      if (dup) toast('A topic named "' + dup.name + '" already exists', { tone: 'danger' });
      else cat.name = v;
    }
    save();
    renderLibrary();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = cat.name; input.blur(); }
  });
}

function openPaneMenu(anchor, cat) {
  openPopover(anchor, (pop, close) => {
    pop.appendChild(popItem('Rename topic', ICONS.pencil, () => {
      close();
      const node = $('.pane[data-id="' + cat.id + '"]');
      if (node) startPaneRename(node, cat);
    }));
    pop.appendChild(popItem('Delete topic', ICONS.trash, () => {
      close();
      const idx = state.brain.categories.indexOf(cat);
      state.brain.categories.splice(idx, 1);
      captureNotes = captureNotes.filter(r => !cat.notes.some(n => n.id === r.id));
      save();
      renderLibrary();
      const n = cat.notes.length;
      const msg = n ? 'Topic "' + cat.name + '" and ' + n + (n === 1 ? ' note' : ' notes') + ' deleted'
        : 'Topic "' + cat.name + '" deleted';
      undoableToast(msg,
        () => state.brain.categories.splice(clamp(idx, 0, state.brain.categories.length), 0, cat));
    }, 'danger'));
  });
}

/* ---------- interactions ---------- */
(function brainInteractions() {
  const canvas = $('#canvas');
  const vp = $('#viewport');

  canvas.addEventListener('dblclick', (e) => {
    if (state.view !== 'brain' || brainTab !== 'board') return;
    if (e.target !== canvas) return;
    const r = canvas.getBoundingClientRect();
    openBnoteComposer(e.clientX - r.left - BNOTE_W / 2, e.clientY - r.top - 20);
  });

  $('#fabCapture').addEventListener('click', () => {
    if (activeBnoteComposer) { $('textarea', activeBnoteComposer).focus(); return; }
    const x = vp.scrollLeft + vp.clientWidth / 2 - BNOTE_W / 2;
    const y = vp.scrollTop + Math.min(vp.clientHeight / 3, 220);
    openBnoteComposer(x, y);
    const comp = activeBnoteComposer;
    if (comp) comp.scrollIntoView({ block: 'center', inline: 'center' });
  });

  /* drag saved notes around the capture board */
  let d = null;
  let suppressClick = false;
  canvas.addEventListener('pointerdown', (e) => {
    if (e.button !== 0 || state.view !== 'brain') return;
    const node = e.target.closest('.bnote');
    if (!node || node.classList.contains('composing')) return;
    if (e.target.closest('button, input, textarea')) return;
    d = { node, sx: e.clientX, sy: e.clientY, ox: parseInt(node.style.left, 10), oy: parseInt(node.style.top, 10), h: node.offsetHeight, moved: false };
  });
  window.addEventListener('pointermove', (e) => {
    if (!d) return;
    const dx = e.clientX - d.sx, dy = e.clientY - d.sy;
    if (!d.moved && Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
    if (!d.moved) { d.moved = true; d.node.classList.add('bnote-dragging'); document.body.classList.add('dragging-any'); lockTouchScroll(); }
    d.node.style.left = clamp(d.ox + dx, 0, CANVAS_W - BNOTE_W) + 'px';
    d.node.style.top = clamp(d.oy + dy, 0, CANVAS_H - Math.max(60, d.h)) + 'px';
    autoscrollViewport(e);
  });
  function finishBnoteDrag(revert) {
    if (revert) { d.node.style.left = d.ox + 'px'; d.node.style.top = d.oy + 'px'; }
    else {
      const ref = captureNotes.find(r => r.id === d.node.dataset.id);
      if (ref) { ref.x = parseInt(d.node.style.left, 10); ref.y = parseInt(d.node.style.top, 10); }
    }
    d.node.classList.remove('bnote-dragging');
    document.body.classList.remove('dragging-any');
    unlockTouchScroll();
    stopAutoscroll();
    suppressClick = !revert && d.moved; // pointercancel produces no click to swallow
    d = null;
  }
  window.addEventListener('pointerup', () => { if (d) finishBnoteDrag(false); });
  window.addEventListener('pointercancel', () => { if (d) finishBnoteDrag(true); });

  canvas.addEventListener('click', (e) => {
    if (state.view !== 'brain') return;
    if (suppressClick) { suppressClick = false; return; }
    const node = e.target.closest('.bnote');
    if (!node || node.classList.contains('composing')) return;
    if (e.target.closest('button, input, textarea')) return;
    openNoteModal(node.dataset.id);
  });

  /* library delegation */
  $('#library').addEventListener('click', (e) => {
    const menuBtn = e.target.closest('.pane-menu-btn');
    if (menuBtn) {
      const cat = findCat(menuBtn.closest('.pane').dataset.id);
      if (cat) openPaneMenu(menuBtn, cat);
      return;
    }
    const pn = e.target.closest('.pnote');
    if (pn) openNoteModal(pn.dataset.id);
  });
  $('#library').addEventListener('dblclick', (e) => {
    const titleEl = e.target.closest('.pane-title');
    if (!titleEl) return;
    const pane = titleEl.closest('.pane');
    const cat = findCat(pane.dataset.id);
    if (cat) startPaneRename(pane, cat);
  });
})();

<script>
/* Slate — command palette (⌘K): global search over boards, cards, tags,
   Brain notes and topics, plus quick actions. Everything is textContent-safe. */
'use strict';

const PALETTE_ICONS = {
  action: 'M6 3.5l5 4.5-5 4.5',
  ws: 'M3.5 3.5h9a1.5 1.5 0 0 1 1.5 1.5v6a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 11V5a1.5 1.5 0 0 1 1.5-1.5zM2 6.5h12',
  board: 'M2.5 2.5h4.5v11H2.5zM9 2.5h4.5v7H9z',
  card: 'M5.5 8.4l1.8 1.8 3.4-3.9M14 8A6 6 0 1 1 2 8a6 6 0 0 1 12 0z',
  topic: 'M2.5 7.5l6-5.4 5 .4.4 5-6 5.4a1.2 1.2 0 0 1-1.7 0l-3.7-3.7a1.2 1.2 0 0 1 0-1.7zM10.5 5.5h.01',
  note: 'M3 5h10M3 8h10M3 11h6',
};
const PALETTE_GROUPS = [
  ['action', 'Actions'],
  ['ws', 'Workspaces'],
  ['board', 'Boards'],
  ['card', 'Cards'],
  ['topic', 'Topics'],
  ['note', 'Notes'],
];

let paletteTeardown = null;

/* ---------- helpers shared with locate targets ---------- */
function closeAnyModal() {
  const bd = $('#modalRoot .modal-backdrop');
  if (bd) bd.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
  const lb = $('#lightboxRoot .lightbox');
  if (lb) lb.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
}
function pulseNode(node) {
  if (!node) return;
  node.classList.add('locate-pulse');
  setTimeout(() => node.classList.remove('locate-pulse'), 1300);
}

function locateBoard(wsObj, board) {
  closeAnyModal();
  state.view = 'tasks';
  state.activeWs = wsObj.id;
  save();
  renderAll();
  const vp = $('#viewport');
  vp.scrollTo({ left: Math.max(0, board.x - 120), top: Math.max(0, board.y - 90), behavior: 'smooth' });
  pulseNode($('.board[data-id="' + board.id + '"]'));
}
function locateCard(wsObj, card) {
  closeAnyModal();
  state.view = 'tasks';
  state.activeWs = wsObj.id;
  // resolve live — the card may have moved boards or completed since the palette indexed it
  let board = null, isDone = false;
  for (const b of wsObj.boards) {
    if (b.cards.includes(card)) { board = b; break; }
    if (b.done.includes(card)) { board = b; isDone = true; break; }
  }
  if (!board) {
    save();
    renderAll();
    toast('That card no longer exists');
    return;
  }
  if (isDone) board.showDone = true;
  save();
  renderAll();
  const vp = $('#viewport');
  vp.scrollTo({ left: Math.max(0, board.x - 120), top: Math.max(0, board.y - 90), behavior: 'smooth' });
  pulseNode($('.board[data-id="' + board.id + '"]'));
  openCardModal(card.id);
}
function locateTopic(cat) {
  closeAnyModal();
  state.view = 'brain';
  brainTab = 'library';
  save();
  renderAll();
  const pane = $('.pane[data-id="' + cat.id + '"]');
  if (pane) pane.scrollIntoView({ behavior: 'smooth', block: 'start' });
  pulseNode(pane);
}
function locateNote(noteId) {
  closeAnyModal();
  state.view = 'brain';
  brainTab = 'library';
  save();
  renderAll();
  const f = findNote(noteId);
  if (!f) return;
  const pane = $('.pane[data-id="' + f.cat.id + '"]');
  if (pane) pane.scrollIntoView({ behavior: 'smooth', block: 'start' });
  pulseNode(pane);
  openNoteModal(noteId);
}

/* ---------- index ---------- */
function paletteIndex() {
  const out = [];
  const goView = (view, tab) => () => {
    closeAnyModal();
    state.view = view;
    if (tab) brainTab = tab;
    save();
    renderAll();
  };
  out.push({ type: 'action', label: 'New board', hint: 'Boards', run: () => {
    closeAnyModal();
    state.view = 'tasks';
    save();
    renderAll();
    const vp = $('#viewport');
    createBoardAt(vp.scrollLeft + vp.clientWidth / 2 - BOARD_W / 2, vp.scrollTop + Math.min(vp.clientHeight / 3, 180));
  } });
  out.push({ type: 'action', label: 'Write a note', hint: 'Brain', run: () => {
    closeAnyModal();
    state.view = 'brain';
    brainTab = 'board';
    save();
    renderAll();
    const vp = $('#viewport');
    openBnoteComposer(vp.scrollLeft + vp.clientWidth / 2 - BNOTE_W / 2, vp.scrollTop + Math.min(vp.clientHeight / 3, 200));
  } });
  out.push({ type: 'action', label: 'Go to Boards', hint: 'View', run: goView('tasks') });
  out.push({ type: 'action', label: 'Go to Brain board', hint: 'View', run: goView('brain', 'board') });
  out.push({ type: 'action', label: 'Go to Library', hint: 'View', run: goView('brain', 'library') });
  out.push({ type: 'action', label: 'Toggle dark mode', hint: 'Theme', run: () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    save();
    applyTheme();
  } });
  out.push({ type: 'action', label: 'Tidy boards', hint: 'Boards', run: () => {
    closeAnyModal();
    state.view = 'tasks';
    save();
    renderAll();
    tidyBoards();
  } });
  out.push({ type: 'action', label: 'Export backup', hint: 'Data', run: () => exportBackup() });

  for (const w of state.ws) {
    out.push({ type: 'ws', label: w.name, hint: w.boards.length + (w.boards.length === 1 ? ' board' : ' boards'), run: () => {
      closeAnyModal();
      state.view = 'tasks';
      state.activeWs = w.id;
      save();
      renderAll();
    } });
    for (const b of w.boards) {
      out.push({ type: 'board', label: b.name, hint: w.name, run: () => locateBoard(w, b) });
      for (const c of b.cards) {
        out.push({ type: 'card', label: c.t, hay: c.t + ' ' + (c.d || '') + ' ' + c.tags.join(' '),
          hint: w.name + ' · ' + b.name, run: () => locateCard(w, c) });
      }
      for (const c of b.done) {
        out.push({ type: 'card', label: c.t, done: true, hay: c.t + ' ' + (c.d || '') + ' ' + c.tags.join(' '),
          hint: w.name + ' · ' + b.name + ' · done', run: () => locateCard(w, c) });
      }
    }
  }
  for (const cat of state.brain.categories) {
    out.push({ type: 'topic', label: cat.name, hint: 'Brain · ' + cat.notes.length + (cat.notes.length === 1 ? ' note' : ' notes'),
      run: () => locateTopic(cat) });
    for (const n of cat.notes) {
      const chars = Array.from(n.text); // code-point slice: never split an emoji surrogate pair
      out.push({ type: 'note', label: chars.length > 90 ? chars.slice(0, 90).join('') + '…' : n.text, hay: n.text,
        hint: 'Brain · ' + cat.name, run: () => locateNote(n.id) });
    }
  }
  return out;
}

function paletteScore(entry, q) {
  if (!q) return (entry.type === 'action' || entry.type === 'ws') ? 1 : 0;
  const label = entry.label.toLowerCase();
  const hay = (entry.hay || entry.label).toLowerCase();
  const i = label.indexOf(q);
  if (i === 0) return 5;
  if (i > 0 && /[^a-z0-9]/.test(label[i - 1])) return 4;
  if (i > 0) return 3;
  if (hay.includes(q)) return 2;
  const tokens = q.split(/\s+/).filter(Boolean);
  if (tokens.length > 1 && tokens.every(t => hay.includes(t))) return 1.5;
  return 0;
}

/* ---------- UI ---------- */
function openPalette() {
  if (paletteTeardown || !state) return;
  if ($('.palette-backdrop')) return; // previous instance still fading out
  const backdrop = el('div', 'palette-backdrop');
  const panel = el('div', 'palette');
  const input = el('input', 'palette-input');
  input.placeholder = 'Search cards, notes, boards… or type a command';
  input.setAttribute('aria-label', 'Search');
  const results = el('div', 'palette-results');
  const foot = el('div', 'palette-foot');
  for (const [k, v] of [['↑↓', 'navigate'], ['↵', 'open'], ['esc', 'close']]) {
    const s = el('span', 'palette-key');
    s.appendChild(el('kbd', null, k));
    s.appendChild(el('span', null, v));
    foot.appendChild(s);
  }
  panel.append(input, results, foot);
  backdrop.appendChild(panel);
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add('show'));

  const entries = paletteIndex();
  let visible = [];
  let selected = 0;

  function render() {
    const q = input.value.trim().toLowerCase();
    const scored = entries
      .map(e => ({ e, s: paletteScore(e, q) }))
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s);
    const byType = new Map();
    for (const { e } of scored) {
      const arr = byType.get(e.type) || [];
      if (arr.length < (q ? 5 : 8)) arr.push(e);
      byType.set(e.type, arr);
    }
    results.textContent = '';
    visible = [];
    for (const [type, title] of PALETTE_GROUPS) {
      const arr = byType.get(type);
      if (!arr || !arr.length) continue;
      results.appendChild(el('div', 'palette-group', title));
      for (const e of arr) {
        if (visible.length >= 16) break;
        const idx = visible.length;
        visible.push(e);
        const row = el('button', 'palette-row');
        row.appendChild(paletteRowIcon(type));
        const label = el('span', 'palette-row-label' + (e.done ? ' done' : ''));
        appendHighlighted(label, e.label, q);
        row.appendChild(label);
        if (e.hint) row.appendChild(el('span', 'palette-row-hint', e.hint));
        row.addEventListener('click', () => pick(idx));
        row.addEventListener('mousemove', () => { if (selected !== idx) { selected = idx; paint(); } });
        results.appendChild(row);
      }
    }
    if (!visible.length) results.appendChild(el('div', 'palette-empty', q ? 'Nothing matches "' + input.value.trim() + '"' : 'Nothing here yet'));
    selected = 0;
    paint();
  }
  function paint() {
    $$('.palette-row', results).forEach((r, i) => r.classList.toggle('active', i === selected));
    const active = $$('.palette-row', results)[selected];
    if (active) active.scrollIntoView({ block: 'nearest' });
  }
  function pick(idx) {
    const e = visible[idx];
    if (!e) return;
    close();
    e.run();
  }
  function onKey(e) {
    if (e.key === 'Escape') { e.stopPropagation(); e.preventDefault(); close(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); selected = Math.min(selected + 1, visible.length - 1); paint(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selected = Math.max(selected - 1, 0); paint(); }
    else if (e.key === 'Enter') { e.preventDefault(); pick(selected); }
  }
  function close() {
    if (!paletteTeardown) return;
    paletteTeardown = null;
    backdrop.classList.remove('show');
    setTimeout(() => backdrop.remove(), 150);
    window.removeEventListener('keydown', onKey, true);
  }
  paletteTeardown = close;
  input.addEventListener('input', render);
  window.addEventListener('keydown', onKey, true);
  backdrop.addEventListener('mousedown', (e) => { if (e.target === backdrop) close(); });
  render();
  input.focus();
}

function paletteRowIcon(type) {
  const wrap = el('span', 'palette-row-icon');
  wrap.appendChild(svgIcon(PALETTE_ICONS[type] || PALETTE_ICONS.action, 14, 1.5));
  return wrap;
}
function appendHighlighted(node, text, q) {
  if (!q) { node.textContent = text; return; }
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) { node.textContent = text; return; }
  node.appendChild(document.createTextNode(text.slice(0, i)));
  node.appendChild(el('b', null, text.slice(i, i + q.length)));
  node.appendChild(document.createTextNode(text.slice(i + q.length)));
}

/* ---------- wiring ---------- */
(function paletteWiring() {
  $('#searchBtn').addEventListener('click', openPalette);
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      openPalette();
    }
  });
})();

<script>
/* Slate — card modal, workspace switcher, settings, export/import, init */
'use strict';

/* ---------- card modal ---------- */
let refreshModalAttachments = null;

function openCardModal(cardId) {
  const found = findCard(cardId);
  if (!found) return;
  const { card, board } = found;
  const root = $('#modalRoot');
  root.textContent = '';

  const backdrop = el('div', 'modal-backdrop');
  const modal = el('div', 'modal' + (card.color ? ' tint-' + card.color : ''));
  modal.dataset.cardId = card.id;
  const accent = el('div', 'modal-accent');
  modal.appendChild(accent);
  const body = el('div', 'modal-body');
  modal.appendChild(body);

  /* title */
  const title = el('textarea', 'modal-title');
  title.rows = 1;
  title.value = card.t;
  title.placeholder = 'Card title';
  title.addEventListener('input', () => { card.t = title.value.trim() || card.t; save(); });
  title.addEventListener('blur', () => { if (!title.value.trim()) title.value = card.t; });
  body.appendChild(title);
  autoGrow(title);

  /* color row */
  const colorSec = section('Color');
  const swatches = el('div', 'swatches');
  const noneBtn = swatchBtn(null, card.color === null);
  swatches.appendChild(noneBtn);
  for (const cc of CARD_COLORS) swatches.appendChild(swatchBtn(cc, card.color === cc));
  colorSec.appendChild(swatches);
  body.appendChild(colorSec);

  function swatchBtn(cc, active) {
    const b = el('button', 'swatch' + (cc ? ' tint-' + cc : ' swatch-none') + (active ? ' active' : ''));
    b.title = cc ? COLOR_NAMES[cc] : 'No color';
    b.addEventListener('click', () => {
      card.color = cc;
      save();
      $$('.swatch', swatches).forEach(s => s.classList.remove('active'));
      b.classList.add('active');
      modal.className = 'modal' + (cc ? ' tint-' + cc : '');
    });
    return b;
  }

  /* due date */
  const dueSec = section('Due date');
  const dueRow = el('div', 'due-row');
  const dueInput = el('input');
  dueInput.type = 'date';
  dueInput.className = 'due-input';
  if (card.due) dueInput.value = card.due;
  dueInput.addEventListener('change', () => { card.due = dueInput.value || null; save(); });
  const dueClear = el('button', 'ghost-btn');
  dueClear.title = 'Clear date';
  dueClear.appendChild(svgIcon(ICONS.x, 12, 1.7));
  dueClear.addEventListener('click', () => { dueInput.value = ''; card.due = null; save(); });
  dueRow.append(dueInput, dueClear);
  dueSec.appendChild(dueRow);
  body.appendChild(dueSec);

  /* tags */
  const tagSec = section('Tags');
  const tagWrap = el('div', 'tag-edit');
  const chipRow = el('div', 'chip-row');
  const tagInput = el('input', 'tag-input');
  tagInput.placeholder = 'Add a tag…';
  tagInput.maxLength = 40;
  const sugRow = el('div', 'tag-suggestions');
  tagWrap.append(chipRow, tagInput, sugRow);
  tagSec.appendChild(tagWrap);
  body.appendChild(tagSec);

  function renderTagEditor() {
    chipRow.textContent = '';
    for (const t of card.tags) {
      const chip = el('span', 'chip tag-chip tint-' + tagColor(t), t);
      const rm = el('button', 'chip-x');
      rm.setAttribute('aria-label', 'Remove tag ' + t);
      rm.appendChild(svgIcon(ICONS.x, 9, 2));
      rm.addEventListener('click', () => { card.tags = card.tags.filter(x => x !== t); save(); renderTagEditor(); });
      chip.appendChild(rm);
      chipRow.appendChild(chip);
    }
    sugRow.textContent = '';
    const q = tagInput.value.trim().toLowerCase();
    const existing = collectWsTags().filter(t => !card.tags.includes(t) && (!q || t.toLowerCase().includes(q)));
    for (const t of existing.slice(0, 6)) {
      const s = el('button', 'chip tag-chip suggestion tint-' + tagColor(t), t);
      s.addEventListener('click', () => { addTag(t); });
      sugRow.appendChild(s);
    }
  }
  function addTag(t) {
    t = t.trim().replace(/,+$/, '');
    if (!t || card.tags.includes(t)) { tagInput.value = ''; renderTagEditor(); return; }
    card.tags.push(t);
    save();
    tagInput.value = '';
    renderTagEditor();
    tagInput.focus();
  }
  tagInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(tagInput.value); }
    else if (e.key === 'Backspace' && !tagInput.value && card.tags.length) {
      card.tags.pop(); save(); renderTagEditor();
    }
  });
  tagInput.addEventListener('input', renderTagEditor);
  renderTagEditor();

  /* description */
  const descSec = section('Description');
  const desc = el('textarea', 'modal-desc');
  desc.rows = 3;
  desc.placeholder = 'Add a description…';
  desc.value = card.d || '';
  desc.addEventListener('input', () => { card.d = desc.value; save(); });
  descSec.appendChild(desc);
  body.appendChild(descSec);
  autoGrow(desc);

  /* attachments */
  const attSec = section('Attachments');
  const attGrid = el('div', 'att-grid');
  const attActions = el('div', 'att-actions');
  const browse = el('button', 'ghost-btn att-browse');
  browse.appendChild(svgIcon(ICONS.upload, 13, 1.6));
  browse.appendChild(el('span', null, 'Add files'));
  const hiddenInput = el('input');
  hiddenInput.type = 'file';
  hiddenInput.multiple = true;
  hiddenInput.hidden = true;
  browse.addEventListener('click', () => hiddenInput.click());
  hiddenInput.addEventListener('change', async () => {
    const n = await addAttachmentsToCard(card, hiddenInput.files);
    hiddenInput.value = '';
    if (n) { renderAttGrid(); rerenderBoard(board.id); }
  });
  attActions.append(browse, el('span', 'att-hint', 'or drop files anywhere on this card'));
  attSec.append(attGrid, attActions, hiddenInput);
  body.appendChild(attSec);

  function renderAttGrid() {
    attGrid.textContent = '';
    for (const a of card.at) {
      const tile = el('div', 'att-tile');
      const open = el('button', 'att-tile-open');
      open.title = a.name;
      if (a.thumb) {
        const img = el('img');
        img.src = a.thumb;
        img.alt = a.name;
        open.appendChild(img);
      } else {
        open.classList.add('att-tile-file');
        open.appendChild(svgIcon(ICONS.file, 18, 1.3));
        open.appendChild(el('span', 'att-tile-ext', extOf(a.name)));
      }
      open.addEventListener('click', () => openAttachment(a));
      const label = el('div', 'att-tile-name', a.name);
      label.title = a.name + ' · ' + fmtSize(a.size);
      const rm = el('button', 'att-tile-x');
      rm.title = 'Remove attachment';
      rm.appendChild(svgIcon(ICONS.x, 10, 2));
      rm.addEventListener('click', () => {
        card.at = card.at.filter(x => x.id !== a.id);
        fileDel(a.id);
        save();
        renderAttGrid();
        rerenderBoard(board.id);
      });
      tile.append(open, label, rm);
      attGrid.appendChild(tile);
    }
    attGrid.hidden = !card.at.length;
  }
  renderAttGrid();
  refreshModalAttachments = (c) => { if (c.id === card.id) renderAttGrid(); };

  /* footer */
  const foot = el('div', 'modal-foot');
  const completeBtn = el('button', 'primary-btn complete-btn');
  const isDone = found.done;
  completeBtn.appendChild(svgIcon(ICONS.check, 13, 2));
  completeBtn.appendChild(el('span', null, isDone ? 'Restore' : 'Complete'));
  completeBtn.addEventListener('click', () => {
    closeModal();
    if (isDone) restoreCard(card.id);
    else completeCard(card.id);
  });
  const created = el('span', 'modal-stamp', 'Created ' + new Date(card.created).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }));
  const del = el('button', 'ghost-btn danger');
  del.appendChild(svgIcon(ICONS.trash, 13, 1.5));
  del.appendChild(el('span', null, 'Delete'));
  del.addEventListener('click', () => {
    closeModal();
    const arr = isDone ? board.done : board.cards;
    const idx = arr.indexOf(card);
    if (idx >= 0) arr.splice(idx, 1);
    save();
    rerenderBoard(board.id);
    undoableToast('Card deleted', () => arr.splice(clamp(idx, 0, arr.length), 0, card));
  });
  foot.append(completeBtn, created, del);
  modal.appendChild(foot);

  function section(label) {
    const s = el('div', 'modal-section');
    s.appendChild(el('div', 'modal-label', label));
    return s;
  }

  /* the modal is itself a drop zone — the window-level handler can't see through the backdrop */
  modal.addEventListener('dragover', (e) => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'copy';
    modal.classList.add('drop-target');
  });
  modal.addEventListener('dragleave', (e) => {
    if (!modal.contains(e.relatedTarget)) modal.classList.remove('drop-target');
  });
  modal.addEventListener('drop', async (e) => {
    e.preventDefault();
    e.stopPropagation();
    modal.classList.remove('drop-target');
    if (!e.dataTransfer.files.length) return;
    const n = await addAttachmentsToCard(card, e.dataTransfer.files);
    if (n) {
      renderAttGrid();
      rerenderBoard(board.id);
      toast(n === 1 ? 'File attached' : n + ' files attached');
    }
  });

  backdrop.appendChild(modal);
  root.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add('show'));

  let closed = false;
  function closeModal() {
    if (closed) return;
    closed = true;
    refreshModalAttachments = null;
    backdrop.classList.remove('show');
    setTimeout(() => backdrop.remove(), 180);
    window.removeEventListener('keydown', onKey);
    if (!card.t) card.t = 'Untitled';
    save.flush();
    rerenderBoard(board.id);
  }
  backdrop.addEventListener('mousedown', (e) => { if (e.target === backdrop) closeModal(); });
  function onKey(e) {
    if (e.key === 'Escape' && !activePopoverClose && !$('#lightboxRoot .lightbox')) closeModal();
  }
  window.addEventListener('keydown', onKey);
  title.focus();
  title.setSelectionRange(title.value.length, title.value.length);
}

function collectWsTags() {
  const set = new Set();
  for (const b of activeWs().boards) {
    for (const c of b.cards) c.tags.forEach(t => set.add(t));
    for (const c of b.done) c.tags.forEach(t => set.add(t));
  }
  return Array.from(set).sort((a, b) => a.localeCompare(b));
}

/* ---------- workspace switcher ---------- */
function openWsSwitcher() {
  const anchor = $('#wsSwitcher');
  openPopover(anchor, (pop, close) => {
    pop.classList.add('ws-pop');
    for (const w of state.ws) {
      const row = el('div', 'ws-row' + (w.id === state.activeWs ? ' active' : ''));
      const name = el('button', 'ws-row-name');
      name.appendChild(el('span', null, w.name));
      name.appendChild(el('span', 'ws-row-count', w.boards.length + (w.boards.length === 1 ? ' board' : ' boards')));
      name.addEventListener('click', () => {
        state.activeWs = w.id;
        save();
        close();
        renderAll();
      });
      const rename = el('button', 'ghost-btn ws-row-btn');
      rename.title = 'Rename workspace';
      rename.appendChild(svgIcon(ICONS.pencil, 12, 1.6));
      rename.addEventListener('click', (e) => {
        e.stopPropagation();
        inlineRename(row, w);
      });
      const trash = el('button', 'ghost-btn ws-row-btn danger');
      trash.title = 'Delete workspace';
      trash.appendChild(svgIcon(ICONS.trash, 12, 1.5));
      trash.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = state.ws.indexOf(w);
        state.ws.splice(idx, 1);
        if (!state.ws.length) state.ws.push(newWorkspace('Personal'));
        if (state.activeWs === w.id) state.activeWs = state.ws[Math.max(0, idx - 1)].id;
        save();
        close();
        renderAll();
        undoableToast('Workspace "' + w.name + '" deleted', () => {
          state.ws.splice(clamp(idx, 0, state.ws.length), 0, w);
          state.activeWs = w.id;
        });
      });
      row.append(name, rename, trash);
      pop.appendChild(row);
    }
    const divider = el('div', 'pop-divider');
    pop.appendChild(divider);
    const add = popItem('New workspace', ICONS.plus, () => {
      const w = newWorkspace('New space');
      state.ws.push(w);
      state.activeWs = w.id;
      save();
      close();
      renderAll();
      openWsSwitcher(); // reopen so they can rename it immediately
      setTimeout(() => {
        const rows = $$('.ws-row');
        const row = rows[rows.length - 1];
        if (row) inlineRename(row, w);
      }, 30);
    });
    pop.appendChild(add);

    function inlineRename(row, w) {
      const input = el('input', 'ws-rename-input');
      input.value = w.name;
      input.maxLength = 60;
      row.textContent = '';
      row.appendChild(input);
      input.focus();
      input.select();
      let done = false;
      const commit = () => {
        if (done) return;
        done = true;
        const v = input.value.trim();
        if (v) w.name = v;
        save();
        close();
        renderTopbar();
        openWsSwitcher();
      };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') { input.value = w.name; input.blur(); }
      });
    }
  });
}

/* ---------- settings ---------- */
async function exportBackup() {
  const files = await fileAll();
  const payload = { app: 'slate', v: 1, exported: new Date().toISOString(), state: state, files: files };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'slate-backup-' + todayISO() + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
  toast('Backup exported');
}

function openSettings() {
  openPopover($('#settingsBtn'), (pop, close) => {
    pop.appendChild(popItem('Export backup', ICONS.download, () => {
      close();
      exportBackup();
    }));
    pop.appendChild(popItem('Import backup', ICONS.upload, () => {
      close();
      const input = el('input');
      input.type = 'file';
      input.accept = 'application/json,.json';
      input.hidden = true;
      document.body.appendChild(input);
      input.addEventListener('change', async () => {
        try {
          const text = await input.files[0].text();
          const payload = JSON.parse(text);
          const st = payload && payload.app === 'slate' ? payload.state : null;
          const valid = st && st.v === 1 && Array.isArray(st.ws) && st.ws.length &&
            st.ws.every(w => w && Array.isArray(w.boards) &&
              w.boards.every(b => b && Array.isArray(b.cards) && Array.isArray(b.done)));
          if (!valid) {
            toast('Not a Slate backup file', { tone: 'danger' });
            return;
          }
          const prev = JSON.parse(JSON.stringify(state));
          for (const [id, dataUrl] of Object.entries(payload.files || {})) await filePut(id, dataUrl);
          state = migrateState(st); // normalizes shape so renderers can't throw on a crafted payload
          saveNow();
          // register the undo BEFORE rendering — even if a render fails, the restore path exists
          undoableToast('Backup imported — replaced ' + prev.ws.length +
            (prev.ws.length === 1 ? ' workspace' : ' workspaces'), () => { state = prev; });
          renderAll();
        } catch (e) {
          console.error(e);
          toast('Could not read that file', { tone: 'danger' });
        } finally {
          input.remove();
        }
      });
      input.click();
    }));
    const divider = el('div', 'pop-divider');
    pop.appendChild(divider);
    const note = el('div', 'pop-note', 'Everything lives in this browser. Export a backup now and then.');
    pop.appendChild(note);
  });
}

/* ---------- init ---------- */
(function init() {
  state = loadState();
  renderAll();
  $('#wsSwitcher').addEventListener('click', openWsSwitcher);
  $('#settingsBtn').addEventListener('click', openSettings);
  $$('#viewSeg .seg-btn').forEach(b => b.addEventListener('click', () => {
    if ((state.view || 'tasks') === b.dataset.view) return;
    state.view = b.dataset.view;
    save();
    renderAll();
  }));
  $$('#brainTabs .seg-btn').forEach(b => b.addEventListener('click', () => {
    if (brainTab === b.dataset.tab) return;
    brainTab = b.dataset.tab;
    renderAll();
  }));
  $('#themeBtn').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    save();
    applyTheme();
  });
  $('#tidyBtn').addEventListener('click', tidyBoards);
  setTimeout(gcAttachments, 4000); // sweep orphaned attachment blobs off the interaction path
  if (recoveryKey) {
    toast('Saved data could not be read — a copy was kept at localStorage["' + recoveryKey + '"]',
      { tone: 'danger', ms: 12000 });
  }
})();

</script>

<style>
/* Slate — base: tokens, layout, topbar, canvas, boards */

:root {
  --bg: #F5F6F8;
  --dot: #D8DCE3;
  --ink: #1B2230;
  --ink-2: #5C6470;
  --ink-3: #9AA1AC;
  --surface: #FFFFFF;
  --tray: rgba(255, 255, 255, 0.62);
  --line: rgba(27, 34, 48, 0.09);
  --line-strong: rgba(27, 34, 48, 0.16);
  --accent: #3A5BF0;
  --accent-ink: #FFFFFF;
  --accent-soft: rgba(58, 91, 240, 0.09);
  --danger: #D14D4D;
  --hover: rgba(27, 34, 48, 0.05);
  --shadow-card: 0 1px 2px rgba(27, 34, 48, 0.07), 0 1px 1px rgba(27, 34, 48, 0.04);
  --shadow-card-hover: 0 3px 10px -2px rgba(27, 34, 48, 0.13), 0 1px 2px rgba(27, 34, 48, 0.06);
  --shadow-board: 0 12px 32px -16px rgba(27, 34, 48, 0.22), 0 2px 8px -2px rgba(27, 34, 48, 0.07);
  --shadow-pop: 0 16px 48px -12px rgba(27, 34, 48, 0.28), 0 3px 10px -2px rgba(27, 34, 48, 0.1);
  --toast-bg: #23293A;
  --toast-ink: #F2F4F8;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Inter", "Helvetica Neue", sans-serif;
  --mono: ui-monospace, "SF Mono", "Menlo", "Cascadia Mono", monospace;
}
[data-theme="dark"] {
  --bg: #0F1216;
  --dot: #262C35;
  --ink: #E7EAF0;
  --ink-2: #9AA3B0;
  --ink-3: #636C79;
  --surface: #1B212A;
  --tray: rgba(22, 26, 33, 0.62);
  --line: rgba(255, 255, 255, 0.08);
  --line-strong: rgba(255, 255, 255, 0.16);
  --accent: #6D87FF;
  --accent-ink: #0F1216;
  --accent-soft: rgba(109, 135, 255, 0.13);
  --danger: #E36868;
  --hover: rgba(255, 255, 255, 0.06);
  --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.28), 0 1px 1px rgba(0, 0, 0, 0.18);
  --shadow-card-hover: 0 4px 12px -2px rgba(0, 0, 0, 0.45), 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-board: 0 14px 36px -16px rgba(0, 0, 0, 0.6), 0 2px 8px -2px rgba(0, 0, 0, 0.35);
  --shadow-pop: 0 16px 48px -12px rgba(0, 0, 0, 0.65), 0 3px 10px -2px rgba(0, 0, 0, 0.4);
  --toast-bg: #E7EAF0;
  --toast-ink: #1B2230;
}

/* card tints: --t-bar (edge), --t-bg (card wash), --t-text (chip ink) */
.tint-c1 { --t-bar: #E05D77; --t-bg: #FCF0F2; --t-text: #AD3B55; }
.tint-c2 { --t-bar: #E5764C; --t-bg: #FCF2ED; --t-text: #B14E28; }
.tint-c3 { --t-bar: #DFA43F; --t-bg: #FBF5E8; --t-text: #8F6A1E; }
.tint-c4 { --t-bar: #6FA85E; --t-bg: #F1F7EE; --t-text: #497C3A; }
.tint-c5 { --t-bar: #41A69F; --t-bg: #ECF6F5; --t-text: #2A7B75; }
.tint-c6 { --t-bar: #4C8FDE; --t-bg: #EEF5FC; --t-text: #2F6BB2; }
.tint-c7 { --t-bar: #7B6DE9; --t-bg: #F3F1FD; --t-text: #5A4BC5; }
.tint-c8 { --t-bar: #B562B0; --t-bg: #F9F0F9; --t-text: #8E4589; }
[data-theme="dark"] .tint-c1 { --t-bg: rgba(224, 93, 119, 0.15); --t-text: #F095A8; }
[data-theme="dark"] .tint-c2 { --t-bg: rgba(229, 118, 76, 0.15); --t-text: #F0A183; }
[data-theme="dark"] .tint-c3 { --t-bg: rgba(223, 164, 63, 0.14); --t-text: #E9C079; }
[data-theme="dark"] .tint-c4 { --t-bg: rgba(111, 168, 94, 0.15); --t-text: #A4CE96; }
[data-theme="dark"] .tint-c5 { --t-bg: rgba(65, 166, 159, 0.15); --t-text: #8BD0CB; }
[data-theme="dark"] .tint-c6 { --t-bg: rgba(76, 143, 222, 0.15); --t-text: #97BFEE; }
[data-theme="dark"] .tint-c7 { --t-bg: rgba(123, 109, 233, 0.16); --t-text: #B1A7F2; }
[data-theme="dark"] .tint-c8 { --t-bg: rgba(181, 98, 176, 0.16); --t-text: #D9A0D6; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--ink);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
body.dragging-any, body.dragging-any * { cursor: grabbing !important; user-select: none; }

/* ---------- topbar ---------- */
#topbar {
  height: 52px;
  flex: 0 0 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px 0 16px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  z-index: 50;
}
.tb-left, .tb-right { display: flex; align-items: center; gap: 6px; }
.logo { display: flex; align-items: center; margin-right: 4px; }
.ws-switcher {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 9px;
  font-size: 15px;
  font-weight: 650;
  letter-spacing: -0.015em;
}
.ws-switcher:hover { background: var(--hover); }
.ws-switcher .chev { color: var(--ink-3); margin-top: 1px; flex-shrink: 0; }
.ws-name {
  display: block;
  max-width: 32vw;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tb-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
}
.tb-btn:hover { background: var(--hover); color: var(--ink); }
.tb-btn.icon-only { padding: 7px; }

/* segmented control (view switcher, brain tabs) */
.seg {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--hover);
  border-radius: 9px;
  padding: 2.5px;
}
.seg-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4.5px 11px;
  border-radius: 7px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-2);
  transition: color 120ms ease, background 120ms ease;
}
.seg-btn svg { opacity: 0.75; }
.seg-btn:hover { color: var(--ink); }
.seg-btn.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-card);
}
.seg-btn.active svg { opacity: 1; color: var(--accent); }

/* ---------- canvas ---------- */
#viewport {
  flex: 1;
  overflow: auto;
  position: relative;
}
#viewport.panning { cursor: grabbing; }
#canvas {
  position: relative;
  background-image: radial-gradient(var(--dot) 1.1px, transparent 1.1px);
  background-size: 22px 22px;
  cursor: default;
}
.canvas-hint {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  color: var(--ink-3);
  font-size: 13.5px;
  letter-spacing: 0.01em;
  pointer-events: none;
  z-index: 5;
}

/* ---------- board ---------- */
.board {
  position: absolute;
  width: 300px;
  display: flex;
  flex-direction: column;
  max-height: min(72vh, 640px);
  background: var(--tray);
  -webkit-backdrop-filter: blur(12px) saturate(1.15);
  backdrop-filter: blur(12px) saturate(1.15);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: var(--shadow-board);
}
.board-enter { animation: board-in 240ms cubic-bezier(0.2, 0.8, 0.3, 1); }
@keyframes board-in {
  from { opacity: 0; transform: scale(0.95) translateY(4px); }
  to { opacity: 1; transform: none; }
}
.board.tidying { transition: left 400ms cubic-bezier(0.25, 0.8, 0.3, 1), top 400ms cubic-bezier(0.25, 0.8, 0.3, 1); }
.board.board-dragging {
  box-shadow: 0 24px 56px -20px rgba(27, 34, 48, 0.38), 0 4px 14px -4px rgba(27, 34, 48, 0.14);
  transform: scale(1.012);
}
[data-theme="dark"] .board.board-dragging {
  box-shadow: 0 24px 56px -18px rgba(0, 0, 0, 0.75), 0 4px 14px -4px rgba(0, 0, 0, 0.4);
}

.board-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 10px 7px 14px;
  cursor: grab;
  user-select: none;
}
.board-title {
  font-size: 14px;
  font-weight: 650;
  letter-spacing: -0.012em;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.board-title-input {
  flex: 1;
  min-width: 0;
  font-size: 14px;
  font-weight: 650;
  letter-spacing: -0.012em;
  border: none;
  background: var(--surface);
  border-radius: 6px;
  padding: 2px 6px;
  margin-left: -6px;
  box-shadow: 0 0 0 2px var(--accent);
}
.board-title-input:focus { outline: none; }
.board-count {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  background: var(--hover);
  padding: 2px 7px;
  border-radius: 99px;
}
.board-menu-btn { color: var(--ink-3); border-radius: 6px; padding: 4px; }
.board-menu-btn:hover { background: var(--hover); color: var(--ink); }

.cards {
  flex: 1 1 auto;
  min-height: 4px;
  overflow-y: auto;
  padding: 2px 10px 2px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--line-strong) transparent;
}
.cards::-webkit-scrollbar { width: 8px; }
.cards::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }

.board-foot { padding: 6px 10px 10px; }
.add-card-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 8px;
  border-radius: 9px;
  color: var(--ink-3);
  font-size: 13px;
  font-weight: 500;
}
.add-card-btn:hover { background: var(--hover); color: var(--ink-2); }

/* viewport scrollbars */
#viewport::-webkit-scrollbar { width: 11px; height: 11px; }
#viewport::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 3px solid var(--bg); }
#viewport::-webkit-scrollbar-corner { background: transparent; }

/* ---------- touch ---------- */
/* manipulation: native pan + pinch stay, double-tap zoom goes (so dblclick works on touch) */
#viewport, #canvas { touch-action: manipulation; }
.board-head { touch-action: none; }   /* board drag wins immediately */
.card { touch-action: pan-y; }        /* lists scroll naturally; long-press lifts a card */

/* ---------- small screens ---------- */
@media (max-width: 700px) {
  #topbar { padding: 0 8px; }
  .tb-left, .tb-right { gap: 3px; }
  .logo { display: none; }
  #tidyBtn span { display: none; }
  .ws-switcher { font-size: 14px; padding: 6px 7px; }
  .ws-name { max-width: 26vw; }
  .seg-btn { padding: 4.5px 8px; font-size: 12px; }
  .canvas-hint { font-size: 12.5px; padding: 0 24px; text-align: center; width: 100%; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}

</style>
<style>
/* Slate — components: cards, chips, composer, modal, popover, toast, lightbox, done ledger */

/* ---------- card ---------- */
.card {
  position: relative;
  background: var(--surface);
  border-radius: 10px;
  padding: 9px 11px 9px 12px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--line);
  cursor: pointer;
  user-select: none;
  overflow: hidden;
  flex-shrink: 0;
  transition: box-shadow 140ms ease, transform 140ms ease;
}
.card:hover { box-shadow: var(--shadow-card-hover); }
.card[class*="tint-"] { background: var(--t-bg); }
.card[class*="tint-"]::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--t-bar);
}
.card.drop-target {
  box-shadow: 0 0 0 2px var(--accent), var(--shadow-card-hover);
}
.card-row { display: flex; align-items: flex-start; gap: 9px; }
.card-title {
  font-size: 13.5px;
  line-height: 1.42;
  font-weight: 500;
  letter-spacing: -0.006em;
  min-width: 0;
  overflow-wrap: break-word;
  width: 100%;
  padding-top: 0.5px;
}
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 7px 0 1px 27px;
}
.card-atts {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 8px 0 1px 27px;
}

/* complete circle */
.complete-circle {
  flex: 0 0 18px;
  width: 18px;
  height: 18px;
  margin-top: 1.5px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
}
.circle-svg { width: 18px; height: 18px; display: block; }
.circle-svg .ring {
  fill: transparent;
  stroke: currentColor;
  stroke-width: 1.5;
  transition: stroke 120ms ease, fill 160ms ease;
}
.circle-svg .tick {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.9;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 12;
  stroke-dashoffset: 12;
  opacity: 0;
  transition: opacity 100ms ease;
}
.complete-circle:hover { color: var(--accent); }
.complete-circle:hover .tick { opacity: 0.45; stroke-dashoffset: 0; transition: stroke-dashoffset 180ms ease, opacity 100ms ease; }
.card.completing .circle-svg .ring { fill: var(--accent); stroke: var(--accent); }
.card.completing .circle-svg .tick {
  stroke: var(--accent-ink);
  opacity: 1;
  animation: tick-draw 260ms 60ms cubic-bezier(0.3, 0.7, 0.4, 1) forwards;
}
@keyframes tick-draw { from { stroke-dashoffset: 12; } to { stroke-dashoffset: 0; } }
.card.completing .card-title { color: var(--ink-3); }
.card.collapsing {
  transition: height 220ms cubic-bezier(0.4, 0, 0.6, 1), opacity 180ms ease, padding 220ms ease, margin 220ms ease, border-width 220ms ease;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  margin-top: -8px;
  border-width: 0;
}

/* filled circle (done list) */
.complete-circle.filled {
  background: var(--accent);
  color: var(--accent-ink);
}
.complete-circle.filled:hover { background: var(--ink-3); }

/* ---------- chips ---------- */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  padding: 2.5px 7px;
  border-radius: 99px;
  background: var(--hover);
  color: var(--ink-2);
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tag-chip[class*="tint-"] { background: var(--t-bg); color: var(--t-text); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--t-bar) 28%, transparent); }
.card[class*="tint-"] .tag-chip[class*="tint-"] { background: color-mix(in srgb, var(--surface) 55%, var(--t-bg)); }
.due-chip { font-family: var(--mono); font-weight: 500; font-size: 10px; }
.due-chip.due-overdue { background: rgba(209, 77, 77, 0.12); color: var(--danger); }
.due-chip.due-today { background: rgba(223, 164, 63, 0.16); color: #96650E; }
[data-theme="dark"] .due-chip.due-today { color: #E9C079; }
.desc-chip { padding: 2.5px 5px; }

/* attachments on card */
.att { border-radius: 7px; display: inline-flex; align-items: center; }
.att-img img {
  width: 34px;
  height: 34px;
  border-radius: 7px;
  object-fit: cover;
  display: block;
  border: 1px solid var(--line);
}
.att-img:hover img { box-shadow: 0 0 0 2px var(--accent); }
.att-file {
  gap: 4px;
  padding: 4px 8px;
  background: var(--hover);
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.att-file:hover { color: var(--ink); border-color: var(--line-strong); }
.att-ext { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.04em; }

/* ---------- ghost & placeholder (card drag) ---------- */
.card-ghost {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  box-shadow: 0 20px 44px -12px rgba(27, 34, 48, 0.4), 0 4px 12px -2px rgba(27, 34, 48, 0.16);
  opacity: 0.98;
}
[data-theme="dark"] .card-ghost { box-shadow: 0 20px 44px -10px rgba(0, 0, 0, 0.75); }
.card-placeholder {
  border-radius: 10px;
  border: 1.5px dashed var(--line-strong);
  background: var(--hover);
  flex-shrink: 0;
}

/* ---------- done ledger ---------- */
.done-bar {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 0 10px 10px;
  padding: 6px 8px;
  border-radius: 8px;
  border-top: 1px solid var(--line);
  border-radius: 0;
  color: var(--ink-3);
  font-size: 12px;
  font-weight: 500;
}
.done-bar:hover { color: var(--ink-2); }
.done-bar-check {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
}
.done-bar-label { flex: 1; text-align: left; font-family: var(--mono); font-size: 11px; }
.done-bar-chev { display: flex; color: var(--ink-3); transition: transform 160ms ease; }
.done-bar-chev.open { transform: rotate(180deg); }
.done-bar-chev svg { display: block; }
.done-list {
  padding: 0 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  max-height: 220px;
}
.done-card {
  opacity: 0.62;
  box-shadow: none;
  background: transparent;
  border-color: transparent;
}
.done-card:hover { opacity: 0.9; background: var(--hover); box-shadow: none; }
.done-card .card-title { color: var(--ink-2); text-decoration: line-through; text-decoration-color: var(--line-strong); }
.done-clear {
  align-self: flex-start;
  margin: 2px 0 0 27px;
  font-size: 11.5px;
  color: var(--ink-3);
  border-radius: 6px;
  padding: 3px 6px;
}
.done-clear:hover { color: var(--danger); background: rgba(209, 77, 77, 0.08); }

/* ---------- composer ---------- */
.composer { display: flex; flex-direction: column; gap: 6px; }
.composer-title, .composer-desc {
  width: 100%;
  resize: none;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: var(--surface);
  padding: 8px 11px;
  font-size: 13.5px;
  line-height: 1.4;
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.composer-title:focus, .composer-desc:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.composer-desc { font-size: 12.5px; color: var(--ink-2); }
.composer-row { display: flex; align-items: center; gap: 4px; }
.composer-row .primary-btn { margin-right: 4px; }

/* ---------- shared buttons ---------- */
.primary-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--accent);
  color: var(--accent-ink);
  font-size: 13px;
  font-weight: 600;
  padding: 7px 13px;
  border-radius: 9px;
  transition: filter 120ms ease, transform 120ms ease;
}
.primary-btn:hover { filter: brightness(1.07); }
.primary-btn:active { transform: scale(0.98); }
.ghost-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border-radius: 8px;
  color: var(--ink-3);
  font-size: 12.5px;
  font-weight: 500;
}
.ghost-btn:hover { background: var(--hover); color: var(--ink-2); }
.ghost-btn.danger:hover { color: var(--danger); background: rgba(209, 77, 77, 0.08); }

/* ---------- modal ---------- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 200;

  display: flex; flex-direction: column; gap: 8px;
}
.bi-empty-title { font-size: 15px; font-weight: 650; color: var(--ink-2); letter-spacing: -0.01em; }
.bi-empty-sub { font-size: 13px; color: var(--ink-3); }

/* ─── INLINE NEW CAT ROW ─── */
.bi-new-cat-row {
  max-width: 860px;
  margin: 0 auto 10px;
  padding: 0 32px;
  display: none;
  align-items: center;
  gap: 8px;
}
.bi-new-cat-input {
  flex: 1;
  background: var(--surface);
  border: 2px solid var(--accent);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.012em;
  color: var(--ink);
  outline: none;
}
.bi-new-cat-input::placeholder { color: var(--ink-3); font-weight: 500; }
.bi-new-cat-add {
  padding: 8px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  background: var(--accent); color: var(--accent-ink);
  transition: opacity 120ms;
}
.bi-new-cat-add:hover { opacity: 0.88; }
.bi-new-cat-cancel {
  padding: 8px 12px; border-radius: 8px;
  font-size: 13px; color: var(--ink-3);
  transition: background 100ms;
}
.bi-new-cat-cancel:hover { background: var(--hover); color: var(--ink); }

/* ─────────────────────────────────────
   CATEGORY PAGE
───────────────────────────────────── */
.bc-breadcrumb {
  max-width: 720px;
  margin: 0 auto;
  padding: 28px 32px 0;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 20px;
}
.bc-back {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; color: var(--ink-3); font-weight: 500;
  border-radius: 6px;
  padding: 4px 0;
  transition: color 120ms;
}
.bc-back:hover { color: var(--accent); }
.bc-sep {
  font-size: 12px; color: var(--ink-3); opacity: 0.5;
}
.bc-current {
  font-size: 13px; color: var(--ink-2); font-weight: 500;
}

.bc-hero {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 22px;
}
.bc-hero-badge {
  width: 44px; height: 44px;
  border-radius: 13px;
  background: var(--t-bg, var(--hover));
  color: var(--t-text, var(--ink-2));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.bc-hero-info { flex: 1; }
.bc-hero-name {
  font-size: 21px;
  font-weight: 720;
  letter-spacing: -0.025em;
  color: var(--ink);
}
.bc-hero-stats {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-top: 2px;
}
.bc-rename-input {
  font-size: 21px;
  font-weight: 720;
  letter-spacing: -0.025em;
  color: var(--ink);
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--accent);
  outline: none;
  width: 100%;
  padding: 0 0 2px;
}
.bc-hero-actions {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px;
}
.bc-action-btn {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-3);
  padding: 5px 9px; border-radius: 7px;
  transition: background 100ms, color 100ms;
}
.bc-action-btn:hover { background: var(--hover); color: var(--ink); }
.bc-action-danger:hover { background: rgba(209,77,77,0.09); color: var(--danger); }

/* Composer */
.bc-composer {
  max-width: 720px;
  margin: 0 auto 24px;
  padding: 0 32px;
}
.bc-composer > div {
  background: var(--surface);
  border-radius: 14px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--line);
  overflow: hidden;
  transition: box-shadow 160ms, border-color 160ms;
}
/* wrap the textarea + foot inside a div */
.bc-composer {
  display: block;
}
.bc-composer-area {
  display: block;
  width: 100%;
  resize: none;
  border: none;
  background: var(--surface);
  border-radius: 14px 14px 0 0;
  padding: 14px 16px 10px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
  outline: none;
  min-height: 58px;
  border: 1px solid var(--line);
  border-bottom: none;
  transition: border-color 160ms, box-shadow 160ms;
}
.bc-composer-area:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  outline: none;
}
.bc-composer-area::placeholder { color: var(--ink-3); }
.bc-composer-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px 8px;
  border: 1px solid var(--line);
  border-top: 1px solid var(--line);
  border-radius: 0 0 14px 14px;
  background: var(--surface);
}
.bc-composer-hint {
  font-size: 11.5px;
  color: var(--ink-3);
}
.bc-composer-save {
  padding: 5px 14px;
  border-radius: 7px;
  background: var(--accent);
  color: var(--accent-ink);
  font-size: 12.5px;
  font-weight: 600;
  transition: opacity 120ms;
}
.bc-composer-save:hover { opacity: 0.88; }

/* Section label */
.bc-section-label {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 32px;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 10px;
}

/* Notes list */
.bc-notes-list {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: var(--line);
}
.bc-notes-empty {
  background: var(--surface);
  padding: 28px 16px;
  font-size: 13px;
  color: var(--ink-3);
  text-align: center;
}
.bc-note-entry {
  background: var(--surface);
  padding: 14px 16px;
  cursor: pointer;
  transition: background 100ms;
}
.bc-note-entry:hover,
.bc-note-entry.focused { background: var(--hover); }
.bc-note-entry.focused { outline: 2px solid var(--accent); outline-offset: -2px; }
.bc-note-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 4px;
}
.bc-note-title {
  font-size: 14px;
  font-weight: 620;
  letter-spacing: -0.01em;
  color: var(--ink);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bc-note-age {
  font-size: 11.5px;
  color: var(--ink-3);
  white-space: nowrap;
  flex-shrink: 0;
}
.bc-note-snippet {
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-2);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bc-note-cat-chip {
  display: inline-block;
  margin-top: 6px;
  padding: 2px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  background: var(--t-bg);
  color: var(--t-text);
}

/* ─────────────────────────────────────
   EDITOR (full pane)
───────────────────────────────────── */
.be-breadcrumb {
  max-width: 660px;
  margin: 0 auto;
  padding: 32px 32px 0;
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 22px;
  opacity: 0.75;
}
.be-bc-btn {
  font-size: 12.5px; color: var(--ink-3); font-weight: 500;
  border-radius: 5px; padding: 2px 4px; margin: -2px -4px;
  transition: color 120ms;
}
.be-bc-btn:hover { color: var(--accent); }
.be-bc-sep { font-size: 11px; color: var(--ink-3); opacity: 0.4; }
.be-bc-note { font-size: 12.5px; color: var(--ink-2); font-weight: 500; }

.be-toolbar {
  max-width: 660px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--line);
  padding-bottom: 10px;
  margin-bottom: 20px;
}
.be-toolbar-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
}
.be-tool-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-3);
  transition: background 100ms, color 100ms;
}
.be-tool-btn:hover { background: var(--hover); color: var(--ink); }
.be-tool-danger:hover { background: rgba(209,77,77,0.09); color: var(--danger); }
.be-autosave {
  font-size: 11.5px;
  color: var(--ink-3);
  display: flex; align-items: center; gap: 5px;
  margin-left: 4px;
}
.be-autosave-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #6FA85E;
  animation: pulse-save 2s infinite;
}
@keyframes pulse-save {
  0%,100% { opacity: 1; }
  50% { opacity: 0.35; }
}

.be-title {
  display: block;
  max-width: 660px;
  margin: 0 auto;
  padding: 0 32px;
  width: 100%;
  border: none;
  background: transparent;
  font-size: 26px;
  font-weight: 720;
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 1.25;
  outline: none;
  resize: none;
  overflow: hidden;
  margin-bottom: 8px;
}
.be-title::placeholder { color: var(--ink-3); font-weight: 600; }

.be-meta {
  max-width: 660px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}
.be-cat-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
  color: var(--t-text);
  background: var(--t-bg);
  padding: 3px 10px;
  border-radius: 99px;
}
.be-meta-date {
  font-size: 12px;
  color: var(--ink-3);
}

.be-body {
  display: block;
  max-width: 660px;
  margin: 0 auto;
  padding: 0 32px;
  width: 100%;
  border: none;
  background: transparent;
  font-size: 15.5px;
  line-height: 1.8;
  color: var(--ink);
  outline: none;
  resize: none;
  min-height: 420px;
}
.be-body::placeholder { color: var(--ink-3); }

.be-wordcount {
  max-width: 660px;
  margin: 0 auto;
  padding: 12px 32px 0;
  font-size: 11.5px;
  color: var(--ink-3);
  text-align: right;
}

/* ─────────────────────────────────────
   QUICK CAPTURE SHEET
───────────────────────────────────── */
#captureOverlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(9,11,16,0.55);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 120px;
}
#captureOverlay.open { display: flex; }
.capture-sheet {
  width: 560px;
  max-width: calc(100vw - 32px);
  background: var(--surface);
  border-radius: 18px;
  box-shadow: var(--shadow-pop);
  border: 1px solid var(--line-strong);
  overflow: hidden;
  animation: sheet-in 180ms cubic-bezier(0.2, 0.8, 0.3, 1);
}
@keyframes sheet-in {
  from { opacity: 0; transform: translateY(-10px) scale(0.97); }
  to { opacity: 1; transform: none; }
}
.capture-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
}
.capture-label {
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--ink-3);
}
.capture-close {
  padding: 4px; border-radius: 6px; color: var(--ink-3);
  transition: background 100ms, color 100ms;
}
.capture-close:hover { background: var(--hover); color: var(--ink); }
#captureArea {
  display: block;
  width: 100%;
  border: none;
  background: transparent;
  padding: 14px 16px;
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink);
  outline: none;
  resize: none;
  min-height: 110px;
}
#captureArea::placeholder { color: var(--ink-3); }
.capture-foot {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px 14px;
  border-top: 1px solid var(--line);
}
#captureCatPicker {
  flex: 1;
  padding: 7px 12px;
  border-radius: 8px;
  border: 1px solid var(--line-strong);
  background: var(--bg);
  font-size: 13px;
  color: var(--ink-2);
  outline: none;
  cursor: pointer;
  font-family: var(--font);
}
#captureCatPicker:focus { border-color: var(--accent); }
.capture-hint {
  font-size: 11.5px; color: var(--ink-3);
  white-space: nowrap;
}
#captureSaveBtn {
  padding: 7px 18px;
  border-radius: 8px;
  background: var(--accent);
  color: var(--accent-ink);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  transition: opacity 120ms;
}
#captureSaveBtn:hover { opacity: 0.88; }

/* ─────────────────────────────────────
   FAB (Brain context: always round)
───────────────────────────────────── */
.fab {
  position: fixed;
  right: 22px;
  bottom: calc(22px + env(safe-area-inset-bottom, 0px));
  z-index: 60;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--accent-ink);
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 28px -8px rgba(58,91,240,0.55), 0 2px 8px -2px rgba(27,34,48,0.2);
  transition: transform 140ms cubic-bezier(0.2,0.8,0.3,1), filter 140ms ease;
}
.fab:hover { filter: brightness(1.08); transform: scale(1.06); }
.fab:active { transform: scale(0.96); }

/* ─────────────────────────────────────
   MOVE POPOVER helper
───────────────────────────────────── */
.pop-move { min-width: 180px; }

/* ─── TOOLBAR LEFT/RIGHT (wave 2a: left side gets mode + pin) ─── */
.be-toolbar-left {
  display: flex; align-items: center; gap: 6px;
}
.be-mode-btn { font-size: 12px; }
.be-pin-active {
  color: var(--accent);
  background: var(--accent-soft);
}
.be-pin-active:hover { background: var(--accent-soft); color: var(--accent); opacity: 0.9; }

/* ─── PREVIEW MODE (FG-03) ─── */
.be-preview {
  max-width: 660px;
  margin: 0 auto;
  padding: 0 32px 40px;
  cursor: text; /* hint: click to edit */
}
.be-preview-empty {
  color: var(--ink-3);
  font-size: 14px;
  font-style: italic;
  padding: 20px 0;
}
/* Markdown rendered elements */
.be-preview .md-h1,
.be-preview .md-h2,
.be-preview .md-h3 { margin: 1.3em 0 0.4em; font-weight: 700; color: var(--ink); }
.be-preview .md-h1 { font-size: 20px; }
.be-preview .md-h2 { font-size: 17px; }
.be-preview .md-h3 { font-size: 15px; }
.be-preview .md-p { margin: 0.85em 0; font-size: 15.5px; line-height: 1.8; color: var(--ink); }
.be-preview .md-ul,
.be-preview .md-ol { padding-left: 22px; margin: 0.7em 0; }
.be-preview .md-ul li,
.be-preview .md-ol li { margin: 0.3em 0; font-size: 15px; line-height: 1.7; color: var(--ink); }
.be-preview .md-blockquote {
  border-left: 3px solid var(--accent);
  margin: 0.8em 0; padding: 6px 14px;
  color: var(--ink-2);
  font-size: 15px;
  background: var(--accent-soft);
  border-radius: 0 6px 6px 0;
}
.be-preview .md-code-block {
  background: var(--hover);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  margin: 0.8em 0;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
}
.be-preview .md-code-inline {
  background: var(--hover);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
}
.be-preview .md-link,
.be-preview a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
.be-preview .md-link:hover { opacity: 0.8; }
.be-preview .md-wikilink {
  color: var(--accent);
  background: var(--accent-soft);
  padding: 1px 6px;
  border-radius: 4px;
  text-decoration: none;
  font-weight: 500;
  cursor: pointer;
}
.be-preview .md-wikilink:hover { opacity: 0.85; }
.be-preview .md-wikilink-dead {
  color: var(--ink-3);
  background: var(--hover);
  padding: 1px 6px;
  border-radius: 4px;
  font-style: italic;
  cursor: default;
}

/* ─── BACKLINKS (FG-04) ─── */
.be-backlinks {
  max-width: 660px;
  margin: 16px auto 0;
  padding: 14px 32px;
  border-top: 1px solid var(--line);
}
.be-backlinks-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.be-backlink-item {
  display: inline-block;
  margin: 3px 5px 3px 0;
  padding: 3px 10px;
  border-radius: 6px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 120ms;
}
.be-backlink-item:hover { opacity: 0.8; }

/* ─── PIN BUTTON on note rows ─── */
.bc-pin-btn {
  flex-shrink: 0;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 5px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 120ms, background 100ms;
  margin-right: 2px;
}
.bc-note-entry:hover .bc-pin-btn,
.bc-pin-btn.bc-pin-active { opacity: 1; }
.bc-pin-btn:hover { background: var(--hover); }
.bc-pin-btn.bc-pin-active { color: var(--accent); }

.bc-note-pinned { background: var(--accent-soft) !important; }
.bc-note-pinned:hover { background: color-mix(in srgb, var(--accent-soft) 80%, var(--hover)) !important; }
.bc-note-pin-glyph { font-size: 11px; opacity: 0.7; }

/* ─── PINNED BADGE on category rows ─── */
.bi-cat-latest-untitled { font-style: italic; color: var(--ink-3); }
.bi-cat-pinned-badge {
  font-size: 10.5px;
  color: var(--ink-3);
  background: var(--hover);
  padding: 2px 6px;
  border-radius: 99px;
}
.bi-pin-glyph { font-size: 10px; margin-left: 4px; opacity: 0.7; }

/* ─── TRASH ROW ─── */
.bi-trash-row { border-color: rgba(209,77,77,0.25); }

/* ─── TRASH VIEW ─── */
.bc-trash-entry { cursor: default !important; }
.bc-trash-actions {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}

/* ─── WIKILINK AUTOCOMPLETE ─── */
.wikilink-autocomplete {
  background: var(--surface);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  box-shadow: var(--shadow-pop);
  min-width: 220px;
  max-width: 340px;
  overflow: hidden;
  animation: sheet-in 120ms ease;
}
.wikilink-ac-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 14px;
  font-size: 13.5px;
  color: var(--ink);
  transition: background 80ms;
}
.wikilink-ac-item:hover { background: var(--hover); }

/* ─── SHORTCUTS OVERLAY (FG-07) ─── */
.shortcuts-backdrop {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(9,11,16,0.5);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 180ms;
}
.shortcuts-backdrop.show { opacity: 1; }
.shortcuts-panel {
  width: 540px;
  max-width: calc(100vw - 32px);
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  background: var(--surface);
  border-radius: 18px;
  box-shadow: var(--shadow-pop);
  border: 1px solid var(--line-strong);
}
.shortcuts-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0;
  background: var(--surface);
  border-radius: 18px 18px 0 0;
}
.shortcuts-title { font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.shortcuts-close {
  padding: 5px; border-radius: 6px; color: var(--ink-3);
  transition: background 100ms, color 100ms;
}
.shortcuts-close:hover { background: var(--hover); color: var(--ink); }
.shortcuts-section {
  padding: 14px 22px;
  border-bottom: 1px solid var(--line);
}
.shortcuts-section:last-child { border-bottom: none; }
.shortcuts-group-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 10px;

    // compute insertion point among visible cards (excluding placeholder)
    const siblings = $$('.card', targetList).filter(n => !n.classList.contains('done-card'));
    let before = null;
    for (const sib of siblings) {
      const r = sib.getBoundingClientRect();
      if (e.clientY < r.top + r.height / 2) { before = sib; break; }
    }
    const ph = drag.placeholder;
    if (before === ph || (ph.parentNode === targetList && ph.nextElementSibling === before)) return;
    const affected = [...siblings, ...$$('.card-placeholder')];
    flip(affected, () => {
      if (before) targetList.insertBefore(ph, before);
      else targetList.appendChild(ph);
    });
  }

  function endCardDrag(e) {
    const { placeholder, ghost, card, fromBoard } = drag;
    const targetList = placeholder.closest('.cards');
    const toBoard = targetList ? findBoard(targetList.dataset.boardId) : fromBoard;

    // state: remove from source
    const fromIdx = fromBoard.cards.indexOf(card);
    if (fromIdx >= 0) fromBoard.cards.splice(fromIdx, 1);
    // state: insert at placeholder position
    let insertIdx = 0;
    for (const n of $$('.card, .card-placeholder', targetList)) {
      if (n === placeholder) break;
      if (n.classList.contains('card') && !n.classList.contains('done-card')) insertIdx++;
    }
    toBoard.cards.splice(clamp(insertIdx, 0, toBoard.cards.length), 0, card);
    save();

    // animate ghost into place, then re-render both boards
    const pr = placeholder.getBoundingClientRect();
    ghost.style.transition = 'transform 160ms cubic-bezier(.2,.7,.3,1)';
    ghost.style.transform = 'translate(' + pr.left + 'px,' + pr.top + 'px) rotate(0deg)';
    const finish = () => {
      ghost.remove();
      rerenderBoard(fromBoard.id);
      if (toBoard.id !== fromBoard.id) rerenderBoard(toBoard.id);
    };
    ghost.addEventListener('transitionend', finish, { once: true });
    setTimeout(finish, 220); // safety net
    document.body.classList.remove('dragging-any');
    unlockTouchScroll();
    stopAutoscroll();
    drag = null;
  }

  function cancelCardDrag() {
    drag.ghost.remove();
    rerenderBoard(drag.fromBoard.id);
    document.body.classList.remove('dragging-any');
    unlockTouchScroll();
    stopAutoscroll();
    drag = null;
  }
})();

<script>
/* Slate — UI components: toasts, undo, popovers, lightbox, composer, complete ritual, board menu, file drops */
'use strict';

/* ---------- toasts + single-slot undo ---------- */
let toastTimer = null;
function toast(msg, opts) {
  opts = opts || {};
  const root = $('#toastRoot');
  root.textContent = '';
  const t = el('div', 'toast' + (opts.tone ? ' toast-' + opts.tone : ''));
  t.appendChild(el('span', 'toast-msg', msg));
  if (opts.action) {
    const btn = el('button', 'toast-action', opts.action.label);
    btn.addEventListener('click', () => { opts.action.fn(); dismissToast(); });
    t.appendChild(btn);
  }
  root.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  if (opts.ms !== 0 && !opts.persist) {
    toastTimer = setTimeout(dismissToast, opts.ms || (opts.action ? 6000 : 3200));
  }
}
function dismissToast() {
  const t = $('#toastRoot .toast');
  if (!t) return;
  t.classList.remove('show');
  setTimeout(() => t.remove(), 220);
}
function undoableToast(msg, revert) {
  toast(msg, { action: { label: 'Undo', fn: () => { revert(); save(); renderAll(); } } });
}

/* ---------- popover ---------- */
let activePopoverClose = null;
function openPopover(anchor, build, opts) {
  closePopover();
  const root = $('#popoverRoot');
  const pop = el('div', 'popover' + ((opts && opts.cls) ? ' ' + opts.cls : ''));
  root.appendChild(pop);
  const close = () => {
    pop.remove();
    window.removeEventListener('mousedown', onOutside, true);
    window.removeEventListener('keydown', onKey, true);
    activePopoverClose = null;
  };
  build(pop, close);
  const r = anchor.getBoundingClientRect();
  pop.style.top = Math.min(r.bottom + 6, window.innerHeight - pop.offsetHeight - 12) + 'px';
  pop.style.left = clamp(r.left, 8, window.innerWidth - pop.offsetWidth - 8) + 'px';
  requestAnimationFrame(() => pop.classList.add('show'));
  function onOutside(e) { if (!pop.contains(e.target) && e.target !== anchor && !anchor.contains(e.target)) close(); }
  function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); close(); } }
  window.addEventListener('mousedown', onOutside, true);
  window.addEventListener('keydown', onKey, true);
  activePopoverClose = close;
  return close;
}
function closePopover() { if (activePopoverClose) activePopoverClose(); }
function popItem(label, icon, fn, cls) {
  const b = el('button', 'pop-item' + (cls ? ' ' + cls : ''));
  if (icon) b.appendChild(svgIcon(icon, 14, 1.5));
  b.appendChild(el('span', null, label));
  b.addEventListener('click', fn);
  return b;
}

/* ---------- lightbox ---------- */
function openLightbox(att, dataUrl) {
  const root = $('#lightboxRoot');
  root.textContent = '';
  const bg = el('div', 'lightbox');
  const fig = el('figure', 'lightbox-fig');
  const img = el('img');
  img.src = dataUrl;
  img.alt = att.name;
  const cap = el('figcaption', 'lightbox-cap');
  cap.appendChild(el('span', 'lightbox-name', att.name));
  const dl = el('button', 'lightbox-dl');
  dl.appendChild(svgIcon(ICONS.download, 14, 1.6));
  dl.appendChild(el('span', null, 'Download'));
  dl.addEventListener('click', (e) => {
    e.stopPropagation();
    const a = document.createElement('a');
    a.href = dataUrl; a.download = att.name;
    document.body.appendChild(a); a.click(); a.remove();
  });
  cap.appendChild(dl);
  fig.append(img, cap);
  bg.appendChild(fig);
  root.appendChild(bg);
  requestAnimationFrame(() => bg.classList.add('show'));
  const close = () => { bg.classList.remove('show'); setTimeout(() => bg.remove(), 200); window.removeEventListener('keydown', onKey); };
  bg.addEventListener('mousedown', (e) => { if (e.target === bg) close(); });
  function onKey(e) { if (e.key === 'Escape') close(); }
  window.addEventListener('keydown', onKey);
}

/* ---------- complete / restore ritual ---------- */
function completeCard(cardId) {
  const found = findCard(cardId);
  if (!found || found.done) return;
  // state-level re-entry guard: a mid-ritual re-render swaps the DOM node, so a class check is not enough
  if (found.card._completing) return;
  found.card._completing = true;
  const node = $('.card[data-id="' + cardId + '"]');
  const doMove = () => {
    delete found.card._completing;
    const idx = found.board.cards.indexOf(found.card);
    if (idx >= 0) found.board.cards.splice(idx, 1);
    found.card.completed = Date.now();
    if (!found.board.done.includes(found.card)) found.board.done.unshift(found.card);
    save();
    rerenderBoard(found.board.id);
  };
  if (!node) { doMove(); return; }
  node.classList.add('completing');
  setTimeout(() => {
    node.style.height = node.offsetHeight + 'px';
    node.getBoundingClientRect();
    node.classList.add('collapsing');
    node.style.height = '0px';
    setTimeout(doMove, 240);
  }, 420);
}
function restoreCard(cardId) {
  for (const b of activeWs().boards) {
    const i = b.done.findIndex(c => c.id === cardId);
    if (i >= 0) {
      const card = b.done.splice(i, 1)[0];
      card.completed = null;
      b.cards.push(card);
      save();
      rerenderBoard(b.id);
      return;
    }
  }
}

/* ---------- card composer ---------- */
function openComposer(boardNode, board, draft) {
  const foot = $('.board-foot', boardNode);
  if ($('.composer', boardNode)) { $('.composer textarea', boardNode).focus(); return; }
  foot.textContent = '';
  const comp = el('div', 'composer');
  const title = el('textarea', 'composer-title');
  title.rows = 1;
  title.placeholder = 'Card title';
  const desc = el('textarea', 'composer-desc');
  desc.rows = 2;
  desc.placeholder = 'Description';
  desc.hidden = true;
  const row = el('div', 'composer-row');
  const addBtn = el('button', 'primary-btn', 'Add card');
  const descBtn = el('button', 'ghost-btn composer-desc-btn');
  descBtn.title = 'Add a description';
  descBtn.appendChild(svgIcon(ICONS.text, 14, 1.6));
  const closeBtn = el('button', 'ghost-btn');
  closeBtn.title = 'Close';
  closeBtn.appendChild(svgIcon(ICONS.x, 13, 1.7));
  row.append(addBtn, descBtn, closeBtn);
  comp.append(title, desc, row);
  foot.appendChild(comp);
  autoGrow(title); autoGrow(desc);
  if (draft) {
    title.value = draft.t;
    desc.value = draft.d;
    desc.hidden = draft.dHidden;
    if (draft.focused) title.focus();
  } else {
    title.focus();
  }

  const closeComposer = () => { comp.remove(); rerenderBoard(board.id); };
  const submit = () => {
    const t = title.value.trim();
    if (!t) { title.focus(); return; }
    const card = newCard(t);
    if (!desc.hidden && desc.value.trim()) card.d = desc.value.trim();
    title.value = ''; desc.value = ''; // clear before rerender so the draft-preserve path reopens empty
    board.cards.push(card);
    save();
    rerenderBoard(board.id);
    const bn = $('.board[data-id="' + board.id + '"]');
    const list = $('.cards', bn);
    list.scrollTop = list.scrollHeight;
    openComposer(bn, board); // stay open for rapid entry
  };
  addBtn.addEventListener('click', submit);
  descBtn.addEventListener('click', () => { desc.hidden = false; desc.focus(); });
  closeBtn.addEventListener('click', closeComposer);
  title.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
    if (e.key === 'Escape') closeComposer();
  });
  desc.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeComposer(); });
}
function autoGrow(ta) {
  const fit = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
  ta.addEventListener('input', fit);
  requestAnimationFrame(fit);
}

/* ---------- board rename ---------- */
function startBoardRename(boardNode, board, isNew) {
  const titleEl = $('.board-title', boardNode);
  const input = el('input', 'board-title-input');
  input.value = board.name;
  input.placeholder = 'Name this board';
  input.maxLength = 80;
  titleEl.replaceWith(input);
  input.focus();
  input.select();
  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    const v = input.value.trim();
    if (v) board.name = v;
    else if (isNew) board.name = 'Untitled';
    save();
    rerenderBoard(board.id);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = board.name || (isNew ? 'Untitled' : ''); input.blur(); }
  });
}

/* ---------- board menu ---------- */
function openBoardMenu(anchor, board) {
  openPopover(anchor, (pop, close) => {
    pop.appendChild(popItem('Rename board', ICONS.pencil, () => {
      close();
      const node = $('.board[data-id="' + board.id + '"]');
      startBoardRename(node, board, false);
    }));
    if (board.done.length) {
      pop.appendChild(popItem(board.showDone ? 'Hide completed' : 'Show completed (' + board.done.length + ')', ICONS.check, () => {
        close();
        board.showDone = !board.showDone;
        save();
        rerenderBoard(board.id);
      }));
    }
    pop.appendChild(popItem('Delete board', ICONS.trash, () => {
      close();
      const ws = activeWs();
      const idx = ws.boards.indexOf(board);
      ws.boards.splice(idx, 1);
      save();
      rerenderBoard(board.id);
      $('#hint').hidden = ws.boards.length > 0;
      undoableToast('Board deleted', () => ws.boards.splice(clamp(idx, 0, ws.boards.length), 0, board));
    }, 'danger'));
  });
}

/* ---------- file drag-in (attachments) ---------- */
(function fileDrops() {
  let dropCard = null;
  window.addEventListener('dragover', (e) => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
    e.preventDefault();
    const over = document.elementFromPoint(e.clientX, e.clientY);
    const cardNode = over && over.closest('.card:not(.done-card)');
    if (dropCard && dropCard !== cardNode) dropCard.classList.remove('drop-target');
    dropCard = cardNode || null;
    if (dropCard) {
      dropCard.classList.add('drop-target');
      e.dataTransfer.dropEffect = 'copy';
    } else {
      e.dataTransfer.dropEffect = 'none';
    }
  });
  window.addEventListener('dragleave', (e) => {
    if (e.relatedTarget === null && dropCard) { dropCard.classList.remove('drop-target'); dropCard = null; }
  });
  window.addEventListener('drop', async (e) => {
    e.preventDefault();
    const node = dropCard;
    if (dropCard) { dropCard.classList.remove('drop-target'); dropCard = null; }
    if (!node || !e.dataTransfer.files.length) return;
    const found = findCard(node.dataset.id);
    if (!found) return;
    const n = await addAttachmentsToCard(found.card, e.dataTransfer.files);
    if (n) {
      rerenderBoard(found.board.id);
      const openModal = $('.modal[data-card-id="' + found.card.id + '"]');
      if (openModal && typeof refreshModalAttachments === 'function') refreshModalAttachments(found.card);
      toast(n === 1 ? 'File attached' : n + ' files attached');
    }
  });
})();

/* ---------- canvas click delegation ---------- */
(function canvasClicks() {
  $('#canvas').addEventListener('click', (e) => {
    const boardNode = e.target.closest('.board');
    if (!boardNode) return;
    const board = findBoard(boardNode.dataset.id);
    if (!board) return;

    const circle = e.target.closest('.complete-circle');
    if (circle) {
      const cardNode = circle.closest('.card');
      if (circle.classList.contains('filled')) restoreCard(cardNode.dataset.id);
      else completeCard(cardNode.dataset.id);
      return;
    }
    const attBtn = e.target.closest('.att');
    if (attBtn) {
      const found = findCard(attBtn.closest('.card').dataset.id);
      const att = found && found.card.at.find(a => a.id === attBtn.dataset.attId);
      if (att) openAttachment(att);
      return;
    }
    if (e.target.closest('.add-card-btn')) { openComposer(boardNode, board); return; }
    if (e.target.closest('.board-menu-btn')) { openBoardMenu(e.target.closest('.board-menu-btn'), board); return; }
    const doneBar = e.target.closest('.done-bar');
    if (doneBar) {
      board.showDone = !board.showDone;
      save();
      rerenderBoard(board.id);
      return;
    }
    if (e.target.closest('.done-clear')) {
      const cleared = board.done.slice();
      board.done = [];
      board.showDone = false;
      save();
      rerenderBoard(board.id);
      undoableToast(cleared.length + ' completed cards cleared', () => { board.done = cleared.concat(board.done); });
      return;
    }
    const cardNode = e.target.closest('.card');
    if (cardNode && !cardNode.classList.contains('done-card') && !e.target.closest('button')) {
      openCardModal(cardNode.dataset.id);
      return;
    }
    if (cardNode && cardNode.classList.contains('done-card') && !e.target.closest('button')) {
      openCardModal(cardNode.dataset.id);
    }
  });

  $('#canvas').addEventListener('dblclick', (e) => {
    const titleEl = e.target.closest('.board-title');
    if (titleEl) {
      const boardNode = titleEl.closest('.board');
      startBoardRename(boardNode, findBoard(boardNode.dataset.id), false);
    }
  });
})();

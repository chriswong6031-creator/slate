</div>

<script id="sw-register">
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  // C6: capture whether a SW was already controlling the page at load time.
  // skipWaiting()+clients.claim() fires controllerchange on the FIRST install too;
  // we only want the toast when an EXISTING SW was REPLACED (i.e. a real update).
  const hadControllerAtLoad = !!navigator.serviceWorker.controller;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((e) => console.warn('Slate: SW registration failed', e));
  });
  // C6: update toast on controllerchange (new SW took over via skipWaiting+claim).
  // No auto-reload — reloading mid-edit would destroy unsaved card/note content.
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!hadControllerAtLoad) return; // first-ever install — not an update
    if (window._swUpdateShown) return;
    window._swUpdateShown = true;
    if (typeof toast === 'function') {
      toast('Slate updated — ', {
        persist: true,
        action: { label: 'Reload', fn: () => location.reload() },
      });
    }
  });
}
</script>
<script id="error-handlers">
/* C8: Global error handlers — surface async failures as a quiet rate-limited toast */
(function() {
  let _errToastMs = 0;
  const _ERR_RATE_LIMIT = 5000; // ms between error toasts
  function _showErrToast(msg) {
    const now = Date.now();
    if (now - _errToastMs < _ERR_RATE_LIMIT) return;
    _errToastMs = now;
    if (typeof toast === 'function') {
      toast('Something went wrong — your last action may not have saved. Export a backup if in doubt.', { tone: 'danger', ms: 6000 });
    }
    console.warn('Slate: unhandled error:', msg);
  }
  window.addEventListener('unhandledrejection', e => {
    _showErrToast(e.reason && (e.reason.message || String(e.reason)));
  });
  window.addEventListener('error', e => {
    // Skip favicon/asset 404s (those are not JS errors)
    if (e.filename && !/\.(js)$/i.test(e.filename)) return;
    _showErrToast(e.message);
  });
})();
</script>
